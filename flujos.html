// ─── KEYBOARD ────────────────────────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  const tag=document.activeElement?.tagName;
  const modal=document.getElementById('m-overlay').classList.contains('open');
  const lnkModal=document.getElementById('lnk-overlay').classList.contains('open');
  if(tag==='INPUT'||tag==='TEXTAREA'||tag==='SELECT')return;

  // Ctrl/Cmd shortcuts
  if((e.ctrlKey||e.metaKey)&&e.key==='z'){e.preventDefault();undo();return;}
  if((e.ctrlKey||e.metaKey)&&(e.key==='y'||(e.shiftKey&&e.key==='z'))){e.preventDefault();redo();return;}

  if(modal||lnkModal){if(e.key==='Escape'){hideModal();hideLinkModal();}return;}

  if(e.key==='Delete'||e.key==='Backspace'){
    e.preventDefault();
    if(edgeCtxIdx!=null)deleteSelectedEdge();
    else if(S.selected)deleteSelected();
    return;
  }
  if(e.key==='Escape'){
    if(S.connecting)cancelConnect();
    else if(edgeCtxIdx!=null)hideEdgeCtx();
    else deselectAll();
    return;
  }
  if(e.key==='s'&&!e.ctrlKey&&!e.metaKey)setMode('select');
  if(e.key==='c'&&!e.ctrlKey&&!e.metaKey)setMode('connect');
  if(e.key==='p'&&!e.ctrlKey&&!e.metaKey)setMode('pan');
  if(e.key==='f')fitView();
  if(e.key==='n'){e.preventDefault();showModal();}
  if(e.key==='i'&&!e.ctrlKey&&!e.metaKey){e.preventDefault();togglePanelStrip();}
  if(e.key==='t'&&!e.ctrlKey&&!e.metaKey){e.preventDefault();toggleTheme();}
  if(e.key==='F11'){e.preventDefault();togglePresentation();}
});

// ─── TOUCH ───────────────────────────────────────────────────────────────────
let ts={pan:false,pinch:false,sx:0,sy:0,stx:0,sty:0,ld:0};
cwrap.addEventListener('touchstart',e=>{
  if(e.target.closest('.node')&&e.touches.length===1)return;
  e.preventDefault();
  if(e.touches.length===1){ts={pan:true,pinch:false,sx:e.touches[0].clientX,sy:e.touches[0].clientY,stx:S.tx,sty:S.ty};}
  else if(e.touches.length===2){const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;ts={pan:false,pinch:true,ld:Math.sqrt(dx*dx+dy*dy)};}
},{passive:false});
cwrap.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(e.touches.length===1&&ts.pan){S.tx=ts.stx+(e.touches[0].clientX-ts.sx);S.ty=ts.sty+(e.touches[0].clientY-ts.sy);applyTransform(false);updateMinimap();}
  else if(e.touches.length===2&&ts.pinch){
    const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;
    const dist=Math.sqrt(dx*dx+dy*dy),f=dist/ts.ld;
    const wr=cwrap.getBoundingClientRect(),cx=(e.touches[0].clientX+e.touches[1].clientX)/2-wr.left,cy=(e.touches[0].clientY+e.touches[1].clientY)/2-wr.top;
    S.tx=cx-(cx-S.tx)*f;S.ty=cy-(cy-S.ty)*f;
    S.scale=Math.min(3,Math.max(.15,S.scale*f));ts.ld=dist;
    applyTransform(false);updateMinimap();
  }
},{passive:false});
cwrap.addEventListener('touchend',()=>{ts={pan:false,pinch:false};});

// ─── WHEEL ───────────────────────────────────────────────────────────────────
cwrap.addEventListener('wheel',e=>{
  e.preventDefault();
  const r=cwrap.getBoundingClientRect();
  const mx=e.clientX-r.left,my=e.clientY-r.top;
  const f=e.deltaY<0?1.02:.98;
  S.tx=mx-(mx-S.tx)*f;S.ty=my-(my-S.ty)*f;
  S.scale=Math.min(3,Math.max(.15,S.scale*f));
  applyTransform(false);updateMinimap();
},{passive:false});

// ─── UNIVERSAL TOOLTIPS ──────────────────────────────────────────────────────
(()=>{
  const tip=document.getElementById('tb-tip');
  let hideTimer;
  
  const showTip = (el) => {
    if(el.closest('.tb-dropdown')?.classList.contains('open')) return;
    clearTimeout(hideTimer);
    tip.textContent = el.getAttribute('data-tooltip');
    tip.style.display = 'block'; // ensure layout
    
    requestAnimationFrame(()=>{
      const r = el.getBoundingClientRect();
      const tw = Math.min(300, tip.offsetWidth || 240);
      const th = tip.offsetHeight || 40;
      const wh = window.innerHeight;
      const ww = window.innerWidth;
      
      // Horizontal centering clamped to screen
      let left = r.left + r.width/2 - tw/2;
      left = Math.max(10, Math.min(left, ww - tw - 10));
      
      // Smart Vertical Positioning:
      // If element is in Top ~160px (toolbar area), ALWAYS place BELOW.
      // Else if element is in bottom half of screen, place ABOVE.
      let t;
      if(r.top < 160) {
        t = r.bottom + 12;
      } else if(r.top > wh / 2) {
        t = r.top - th - 12;
      } else {
        t = r.bottom + 12;
      }
      
      // Clamp Y to screen boundaries
      t = Math.max(10, Math.min(t, wh - th - 10));
      
      tip.style.left = left + 'px';
      tip.style.top = t + 'px';
      tip.classList.add('show');
    });
  };

  document.addEventListener('mouseover', (e) => {
    const el = e.target.closest('[data-tooltip]');
    if(el) showTip(el);
  });
  
  document.addEventListener('mouseout', (e) => {
    const el = e.target.closest('[data-tooltip]');
    if(el) {
      hideTimer = setTimeout(() => { tip.classList.remove('show'); }, 100);
    }
  });

  document.addEventListener('mousedown', () => {
    tip.classList.remove('show');
  });
})();

function initPanelResize() {
  const resizer = document.getElementById('p-resizer');
  const panel = document.getElementById('panel');
  if (!resizer || !panel) return;
  let startX, startW;
  resizer.onmousedown = (e) => {
    startX = e.clientX;
    const currentW = getComputedStyle(document.documentElement).getPropertyValue('--panel-w').trim();
    startW = parseInt(currentW) || 380;
    panel.classList.add('resizing');
    document.body.style.cursor = 'ew-resize';
    document.onmousemove = (e) => {
      const delta = startX - e.clientX;
      const newW = Math.max(300, Math.min(window.innerWidth - 40, startW + delta));
      document.documentElement.style.setProperty('--panel-w', newW + 'px');
    };
    document.onmouseup = () => {
      document.onmousemove = document.onmouseup = null;
      panel.classList.remove('resizing');
      document.body.style.cursor = '';
      localStorage.setItem('ocf-panel-w', document.documentElement.style.getPropertyValue('--panel-w'));
    };
  };
}
function setPanelWidth(w) {
  let finalW;
  if (typeof w === 'number') {
    finalW = w;
  } else {
    const curW = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--panel-w')) || 380;
    const maxW = window.innerWidth - 45;
    finalW = (Math.abs(curW - maxW) < 10) ? 380 : maxW;
  }
  document.documentElement.style.setProperty('--panel-w', finalW + 'px');
  localStorage.setItem('ocf-panel-w', finalW + 'px');
}

function syncGridVisibility(){

}

function toggleOrganize(e){

// ─── INIT ────────────────────────────────────────────────────────────────────
const savedW = localStorage.getItem('ocf-panel-w');
if (savedW) document.documentElement.style.setProperty('--panel-w', savedW);
loadState();
