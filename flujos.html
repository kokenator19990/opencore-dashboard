<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flujos de Negocio — OpenCore</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0a;
  --bg-panel: #141414;
  --border: #222222;
  --text-main: #ffffff;
  --text-dim: #c8c8c8;
  --accent-cyan: #00E5FF;
  --accent-yellow: #E5FF00;
  --accent-red: #FF2A2A;
  --accent-purple: #B200FF;
  --accent-green: #00FF85;
  --font-heading: 'Space Grotesk', sans-serif;
  --font-sans: 'Inter', sans-serif;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%; height: 100%;
  background: var(--bg);
  color: var(--text-main);
  font-family: var(--font-sans);
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
}

/* ANIMATED GRID */
.particles-bg {
  position: fixed; inset: 0; z-index: 1; pointer-events: none; overflow: hidden;
}
.particles-bg::before {
  content: "";
  position: absolute; width: 200%; height: 200%; top: -50%; left: -25%;
  background-image:
    linear-gradient(rgba(0,229,255,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,229,255,0.04) 1px, transparent 1px);
  background-size: 60px 60px;
  transform: perspective(400px) rotateX(65deg);
  animation: gridScroll 15s linear infinite;
}
@keyframes gridScroll {
  0%   { transform: perspective(400px) rotateX(65deg) translateY(0); }
  100% { transform: perspective(400px) rotateX(65deg) translateY(60px); }
}

/* TOP NAV TABS */
.topnav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 201;
  background: rgba(10,10,10,0.92);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(255,255,255,0.06);
  display: flex; align-items: center;
  padding: 0 2rem; height: 36px;
}
.topnav-inner {
  max-width: 1400px; margin: 0 auto; width: 100%;
  display: flex; align-items: center; gap: 0;
}
.topnav a {
  font-family: var(--font-heading); font-size: 0.62rem; font-weight: 700;
  letter-spacing: 2.5px; text-transform: uppercase; text-decoration: none;
  color: rgba(255,255,255,0.32);
  padding: 0 16px; height: 36px;
  display: flex; align-items: center;
  border-bottom: 2px solid transparent;
  transition: color 0.2s, border-color 0.2s;
}
.topnav a:hover { color: rgba(255,255,255,0.65); }
.topnav a.active { color: #ffffff; border-bottom-color: var(--accent-cyan); }
.topnav-sep { width: 1px; height: 14px; background: rgba(255,255,255,0.1); margin: 0 2px; }

/* HEADER */
.header {
  border-bottom: 1px solid var(--border);
  padding: 1.1rem 2rem;
  position: fixed; top: 36px; left: 0; right: 0;
  background: rgba(10,10,10,0.92);
  backdrop-filter: blur(12px);
  z-index: 200;
  display: flex; align-items: center; justify-content: space-between;
}
.header-left { display: flex; align-items: center; gap: 1.5rem; }
.page-title {
  font-family: var(--font-heading); font-size: 0.7rem;
  letter-spacing: 3px; color: rgba(0,229,255,0.6);
  text-transform: uppercase;
}
.header-right { display: flex; align-items: center; gap: 1rem; }
.hint {
  font-size: 0.68rem; color: rgba(255,255,255,0.3);
  letter-spacing: 1px; text-transform: uppercase;
}
.zoom-controls { display: flex; gap: 6px; }
.zoom-btn {
  font-family: var(--font-heading); font-size: 0.8rem; font-weight: 700;
  color: var(--text-dim); background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.12);
  padding: 6px 12px; border-radius: 6px; cursor: pointer;
  transition: all 0.2s;
}
.zoom-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }

/* CANVAS AREA */
#canvas-wrap {
  position: fixed; top: 101px; left: 0; right: 0; bottom: 0;
  z-index: 10; cursor: grab; overflow: hidden;
}
#canvas-wrap.dragging { cursor: grabbing; }
#diagram {
  position: absolute;
  transform-origin: 0 0;
  transition: none;
}

/* NODES */
.node {
  position: absolute;
  border-radius: 12px;
  cursor: pointer;
  transition: box-shadow 0.25s, transform 0.25s;
  user-select: none;
}
.node:hover { transform: translateY(-2px); }
.node-inner {
  padding: 14px 18px;
  border-radius: 12px;
  border: 1px solid;
  min-width: 130px;
  text-align: center;
}
.node-icon {
  font-size: 1.3rem; margin-bottom: 6px; display: block;
}
.node-label {
  font-family: var(--font-heading); font-size: 0.72rem; font-weight: 700;
  letter-spacing: 1px; text-transform: uppercase; line-height: 1.3;
}
.node-sub {
  font-size: 0.6rem; color: rgba(255,255,255,0.45);
  margin-top: 4px; letter-spacing: 0.5px;
}

/* Node color themes */
.node-cyan .node-inner {
  background: rgba(0,229,255,0.08); border-color: rgba(0,229,255,0.4);
  color: #00E5FF;
}
.node-cyan:hover { box-shadow: 0 0 20px rgba(0,229,255,0.35); }
.node-yellow .node-inner {
  background: rgba(229,255,0,0.07); border-color: rgba(229,255,0,0.4);
  color: #E5FF00;
}
.node-yellow:hover { box-shadow: 0 0 20px rgba(229,255,0,0.3); }
.node-purple .node-inner {
  background: rgba(178,0,255,0.08); border-color: rgba(178,0,255,0.4);
  color: #B200FF;
}
.node-purple:hover { box-shadow: 0 0 20px rgba(178,0,255,0.3); }
.node-green .node-inner {
  background: rgba(0,255,133,0.07); border-color: rgba(0,255,133,0.35);
  color: #00FF85;
}
.node-green:hover { box-shadow: 0 0 20px rgba(0,255,133,0.28); }
.node-red .node-inner {
  background: rgba(255,42,42,0.07); border-color: rgba(255,42,42,0.35);
  color: #FF2A2A;
}
.node-red:hover { box-shadow: 0 0 20px rgba(255,42,42,0.28); }
.node-white .node-inner {
  background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.2);
  color: #fff;
}
.node-white:hover { box-shadow: 0 0 20px rgba(255,255,255,0.15); }

/* HUB node (ACME/ERP) */
.node-hub .node-inner {
  background: rgba(0,229,255,0.12); border-color: rgba(0,229,255,0.7);
  color: #00E5FF; padding: 18px 24px; min-width: 160px;
  box-shadow: 0 0 30px rgba(0,229,255,0.2), inset 0 0 20px rgba(0,229,255,0.05);
}
.node-hub:hover { box-shadow: 0 0 40px rgba(0,229,255,0.5); }
.node-hub .node-label { font-size: 0.85rem; letter-spacing: 2px; }

/* SVG arrows */
#arrows-svg {
  position: absolute; top: 0; left: 0;
  pointer-events: none; overflow: visible;
}

/* DETAIL PANEL */
#detail-panel {
  position: fixed; top: 101px; right: 0; bottom: 0;
  width: 360px; z-index: 300;
  background: rgba(12,12,16,0.97);
  border-left: 1px solid rgba(0,229,255,0.2);
  backdrop-filter: blur(16px);
  transform: translateX(100%);
  transition: transform 0.35s cubic-bezier(0.16,1,0.3,1);
  overflow-y: auto;
  padding: 2rem;
}
#detail-panel.open { transform: translateX(0); }
.panel-close {
  position: absolute; top: 1.2rem; right: 1.2rem;
  font-size: 1.2rem; color: var(--text-dim); cursor: pointer;
  background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
  width: 32px; height: 32px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
}
.panel-close:hover { background: rgba(255,255,255,0.12); color: #fff; }
.panel-icon { font-size: 2.2rem; margin-bottom: 0.75rem; }
.panel-title {
  font-family: var(--font-heading); font-size: 1.1rem; font-weight: 700;
  letter-spacing: 1.5px; text-transform: uppercase;
  margin-bottom: 0.3rem;
}
.panel-subtitle {
  font-size: 0.75rem; color: var(--text-dim);
  letter-spacing: 1px; text-transform: uppercase;
  margin-bottom: 1.5rem; padding-bottom: 1rem;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}
.panel-section {
  margin-bottom: 1.4rem;
}
.panel-section-title {
  font-family: var(--font-heading); font-size: 0.65rem; font-weight: 700;
  letter-spacing: 2px; text-transform: uppercase;
  color: var(--accent-cyan); margin-bottom: 0.6rem;
}
.panel-section ul {
  list-style: none;
  display: flex; flex-direction: column; gap: 0.4rem;
}
.panel-section ul li {
  font-size: 0.82rem; color: rgba(255,255,255,0.78);
  padding-left: 1rem; position: relative; line-height: 1.45;
}
.panel-section ul li::before {
  content: "→"; position: absolute; left: 0;
  color: var(--accent-cyan); font-size: 0.7rem;
}
.panel-tag {
  display: inline-block; font-size: 0.62rem; font-weight: 700;
  font-family: var(--font-heading); letter-spacing: 1.5px; text-transform: uppercase;
  padding: 3px 10px; border-radius: 20px; margin: 2px;
}
.tag-cyan { background: rgba(0,229,255,0.12); color: #00E5FF; border: 1px solid rgba(0,229,255,0.3); }
.tag-yellow { background: rgba(229,255,0,0.1); color: #E5FF00; border: 1px solid rgba(229,255,0,0.3); }
.tag-green { background: rgba(0,255,133,0.1); color: #00FF85; border: 1px solid rgba(0,255,133,0.25); }
.panel-opportunity {
  background: rgba(0,229,255,0.06); border: 1px solid rgba(0,229,255,0.2);
  border-radius: 10px; padding: 1rem; margin-top: 1rem;
}
.panel-opportunity .opp-label {
  font-family: var(--font-heading); font-size: 0.6rem; font-weight: 700;
  letter-spacing: 2px; text-transform: uppercase; color: var(--accent-cyan);
  margin-bottom: 0.5rem;
}
.panel-opportunity p {
  font-size: 0.8rem; color: rgba(255,255,255,0.75); line-height: 1.5;
}

/* LEGEND */
#legend {
  position: fixed; bottom: 1.5rem; left: 1.5rem;
  z-index: 200; display: flex; gap: 1rem; flex-wrap: wrap;
}
.legend-item {
  display: flex; align-items: center; gap: 6px;
  font-size: 0.62rem; font-family: var(--font-heading);
  letter-spacing: 1px; text-transform: uppercase;
}
.legend-dot {
  width: 8px; height: 8px; border-radius: 50%;
}
</style>
</head>

// ─── RENDER ───────────────────────────────────────────────────────────────────
const diagram = document.getElementById('diagram');
const svg = document.getElementById('arrows-svg');

// Build node map for center calculations
const nodeMap = {};

NODES.forEach(n => {
  const el = document.createElement('div');
  el.className = `node node-${n.theme}`;
  el.id = 'node-' + n.id;
  el.style.left = n.x + 'px';
  el.style.top = n.y + 'px';
  el.innerHTML = `
    <div class="node-inner">
      <span class="node-icon">${n.icon}</span>
      <div class="node-label">${n.label}</div>
      ${n.sub ? `<div class="node-sub">${n.sub}</div>` : ''}
    </div>`;
  el.addEventListener('click', (e) => { e.stopPropagation(); openPanel(n.id); });
  diagram.appendChild(el);
  nodeMap[n.id] = { el, n };
});

// After rendering, draw arrows (need offsetWidth/Height)
function getCenter(id) {
  const { el, n } = nodeMap[id];
  return {
    x: n.x + (el.offsetWidth || 145) / 2,
    y: n.y + (el.offsetHeight || 90) / 2
  };
}

function drawArrows() {
  svg.innerHTML = '';
  // Arrow marker
  const defs = document.createElementNS('http://www.w3.org/2000/svg','defs');
  defs.innerHTML = `
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="rgba(0,229,255,0.5)"/>
    </marker>
    <marker id="arr-dim" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="rgba(255,255,255,0.15)"/>
    </marker>`;
  svg.appendChild(defs);

  EDGES.forEach(e => {
    const f = getCenter(e.from);
    const t = getCenter(e.to);
    const dx = t.x - f.x, dy = t.y - f.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    // Curve control point
    const mx = (f.x + t.x) / 2;
    const my = (f.y + t.y) / 2;
    const perp = { x: -dy/dist * 30, y: dx/dist * 30 };
    const cx = mx + perp.x, cy = my + perp.y;

    const path = document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d', `M${f.x},${f.y} Q${cx},${cy} ${t.x},${t.y}`);
    path.setAttribute('stroke', 'rgba(0,229,255,0.3)');
    path.setAttribute('stroke-width', '1.5');
    path.setAttribute('fill', 'none');
    path.setAttribute('marker-end', 'url(#arr)');
    svg.appendChild(path);
  });
}

setTimeout(drawArrows, 50);

// ─── PAN & ZOOM ───────────────────────────────────────────────────────────────
const wrap = document.getElementById('canvas-wrap');
let scale = 0.75, tx = 80, ty = 40;
let dragging = false, startX, startY, startTx, startTy;

function applyTransform(smooth) {
  diagram.style.transition = smooth ? 'transform 0.3s ease' : 'none';
  diagram.style.transform = `translate(${tx}px,${ty}px) scale(${scale})`;
}
applyTransform(false);

wrap.addEventListener('mousedown', e => {
  if (e.target.closest('.node')) return;
  dragging = true; wrap.classList.add('dragging');
  startX = e.clientX; startY = e.clientY; startTx = tx; startTy = ty;
});
window.addEventListener('mousemove', e => {
  if (!dragging) return;
  tx = startTx + (e.clientX - startX);
  ty = startTy + (e.clientY - startY);
  applyTransform(false);
});
window.addEventListener('mouseup', () => { dragging = false; wrap.classList.remove('dragging'); });

wrap.addEventListener('wheel', e => {
  e.preventDefault();
  const delta = e.deltaY > 0 ? 0.9 : 1.1;
  const rect = wrap.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  tx = mx - (mx - tx) * delta;
  ty = my - (my - ty) * delta;
  scale = Math.min(2, Math.max(0.3, scale * delta));
  applyTransform(false);
}, { passive: false });

// Touch support
let touches = {}, lastDist = 0, lastTx, lastTy;
wrap.addEventListener('touchstart', e => {
  if (e.touches.length === 1) {
    startX = e.touches[0].clientX; startY = e.touches[0].clientY;
    startTx = tx; startTy = ty;
  } else if (e.touches.length === 2) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    lastDist = Math.sqrt(dx*dx+dy*dy);
    lastTx = tx; lastTy = ty;
  }
}, { passive: true });
wrap.addEventListener('touchmove', e => {
  e.preventDefault();
  if (e.touches.length === 1) {
    tx = startTx + (e.touches[0].clientX - startX);
    ty = startTy + (e.touches[0].clientY - startY);
  } else if (e.touches.length === 2) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const dist = Math.sqrt(dx*dx+dy*dy);
    const delta = dist / lastDist;
    scale = Math.min(2, Math.max(0.3, scale * delta));
    lastDist = dist;
  }
  applyTransform(false);
}, { passive: false });

function zoom(factor) {
  const rect = wrap.getBoundingClientRect();
  const cx = rect.width / 2, cy = rect.height / 2;
  tx = cx - (cx - tx) * factor;
  ty = cy - (cy - ty) * factor;
  scale = Math.min(2, Math.max(0.3, scale * factor));
  applyTransform(true);
}

function resetView() {
  scale = 0.75; tx = 80; ty = 40;
  applyTransform(true);
}

const panel = document.getElementById('detail-panel');
let activeNode = null;

function openPanel(id) {

  activeNode = id;

  document.getElementById('p-icon').textContent = n.icon;
  document.getElementById('p-title').textContent = n.label;
  document.getElementById('p-subtitle').textContent = n.detail.subtitle;

  const body = document.getElementById('p-body');
  body.innerHTML = '';

  // Procesos
  const sec1 = document.createElement('div');
  sec1.className = 'panel-section';
  sec1.innerHTML = `<div class="panel-section-title">Procesos Clave</div><ul>${
    n.detail.procesos.map(p => `<li>${p}</li>`).join('')
  }</ul>`;
  body.appendChild(sec1);

  // Integraciones
  const sec2 = document.createElement('div');
  sec2.className = 'panel-section';
  sec2.innerHTML = `<div class="panel-section-title">Integra con</div><div>${
    n.detail.integraciones.map(i => `<span class="panel-tag tag-cyan">${i}</span>`).join('')
  }</div>`;
  body.appendChild(sec2);

  // Puntos críticos
  const sec3 = document.createElement('div');
  sec3.className = 'panel-section';
  sec3.innerHTML = `<div class="panel-section-title">Puntos Críticos</div><ul>${
    n.detail.criticos.map(c => `<li>${c}</li>`).join('')
  }</ul>`;
  body.appendChild(sec3);

  // Oportunidad OpenCore
  const opp = document.createElement('div');
  opp.className = 'panel-opportunity';
  opp.innerHTML = `<div class="opp-label">⚡ Oportunidad OpenCore</div><p>${n.detail.oportunidad}</p>`;
  body.appendChild(opp);

  panel.classList.add('open');

  // Highlight selected node
  document.querySelectorAll('.node').forEach(el => el.style.opacity = '0.5');
  document.getElementById('node-' + id).style.opacity = '1';
}

function closePanel() {
  panel.classList.remove('open');
  activeNode = null;
  document.querySelectorAll('.node').forEach(el => el.style.opacity = '1');
}

// Click on canvas background closes panel
wrap.addEventListener('click', e => {
  if (!e.target.closest('.node') && !e.target.closest('#detail-panel')) {
    closePanel();
  }
});
</script>
