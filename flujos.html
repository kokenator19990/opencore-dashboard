// ─── NODE DRAG ────────────────────────────────────────────────────────────────
function snapVal(v,g=40){return S.snapGrid?Math.round(v/g)*g:v;}

function onNodeMD(e,id){
  if(e.button!==0)return;
  // Solo bloquear propagación si NO estamos en modo mover (pan)
  if(S.mode!=='pan'){
    e.stopPropagation();
  }
  if(expandedNoteId)closeNote();
  S.nodeDragMoved=false;
  if(S.mode==='select'){
    const n=S.nodes.find(n=>n.id===id);if(!n)return;
    const wr=cwrap.getBoundingClientRect();
    const mx=(e.clientX-wr.left-S.tx)/S.scale;
    const my=(e.clientY-wr.top-S.ty)/S.scale;
    S.draggingNode=id;S.dragOffset={x:mx-n.x,y:my-n.y};
    document.getElementById('node-'+id)?.classList.add('is-drag');
    e.preventDefault();
  }
}

let updateRequested = false;
function requestUpdate(){
  if(updateRequested) return;
  updateRequested = true;
  requestAnimationFrame(()=>{
    updateEdges();
    updateMinimap();
    updateRequested = false;
  });
}

// ─── PANEL EDIT MODE ──────────────────────────────────────────────────────────
function togglePanelEditMode(){
  S.panelEditMode=!S.panelEditMode;
  const btn=document.getElementById('p-edit-btn');
  if(btn){
    btn.textContent=S.panelEditMode?'VISUALIZACIÓN':'EDICIÓN';
    btn.style.borderColor=S.panelEditMode?'rgba(255,255,255,.2)':'rgba(0,229,255,0.15)';
    btn.style.color=S.panelEditMode?'#fff':'var(--c-cyan)';
  }
  if(panelNodeId)renderPanelBody(panelNodeId, S.activeTab);
}

function onMouseMove(e){
  const wr=cwrap.getBoundingClientRect();
  const mx=(e.clientX-wr.left-S.tx)/S.scale;
  const my=(e.clientY-wr.top-S.ty)/S.scale;

  if(S.draggingNode){
    S.nodeDragMoved=true;
    const n=S.nodes.find(n=>n.id===S.draggingNode);if(!n)return;
    // High-precision coordinates
    n.x = mx - S.dragOffset.x;
    n.y = my - S.dragOffset.y;
    const el=document.getElementById('node-'+S.draggingNode);
    if(el){ el.style.transform=`translate3d(${n.x}px, ${n.y}px, 0)`; }
    requestUpdate();
  }else if(S.draggingNoteId){
    const n=S.notes.find(n=>n.id===S.draggingNoteId);
    if(n){
      n.x = mx - S.dragOffset.x;
      n.y = my - S.dragOffset.y;
      const el=document.getElementById('sn-'+n.id);
      if(el){
        el.style.left=n.x+'px';
        el.style.top=n.y+'px';
      }
      requestUpdate();
    }
  }else if(S.panDragging){
    const dx=e.clientX-S.panStart.x,dy=e.clientY-S.panStart.y;
    if(Math.abs(dx)>2||Math.abs(dy)>2)panMoved=true;
    S.tx=S.panStart.tx+dx;S.ty=S.panStart.ty+dy;
    applyTransform(false);
    requestUpdate();
  }else if(S.draggingFrameId){
    const f=S.frames.find(f=>f.id===S.draggingFrameId);
    if(f){
      f.x = mx - S.dragOffset.x;
      f.y = my - S.dragOffset.y;
      const el=document.getElementById('fr-'+f.id);
      if(el){ el.style.left=f.x+'px'; el.style.top=f.y+'px'; }
      requestUpdate();
    }
  }else if(S.resizingFrameId){
    const f=S.frames.find(f=>f.id===S.resizingFrameId);
    if(f){
      f.w = Math.max(200, mx - S.dragOffset.x);
      f.h = Math.max(150, my - S.dragOffset.y);
      const el=document.getElementById('fr-'+f.id);
      if(el){ el.style.width=f.w+'px'; el.style.height=f.h+'px'; }
      requestUpdate();
    }
  }else if(S.resizingNoteId){
    const n=S.notes.find(n=>n.id===S.resizingNoteId);
    if(n){
      n.w = Math.max(80, mx - S.dragOffset.x);
      n.h = Math.max(80, my - S.dragOffset.y);
      const el=document.getElementById('sn-'+n.id);
      if(el){ el.style.width=n.w+'px'; el.style.height=n.h+'px'; }
      requestUpdate();
    }
  }else if(S.mode==='connect'&&S.connecting){
    updateConnPreview(e);
  }
}

function onMouseUp(){
  if(S.draggingNode){
    const n=S.nodes.find(n=>n.id===S.draggingNode);
    if(n&&S.nodeDragMoved&&S.snapGrid){
      n.x=snapVal(n.x);n.y=snapVal(n.y);
      const el=document.getElementById('node-'+S.draggingNode);
      if(el){ el.style.transform=`translate3d(${n.x}px, ${n.y}px, 0)`; }
      updateEdges();
    } else if(n) {
      const el=document.getElementById('node-'+S.draggingNode);
      if(el){ el.style.transform=`translate3d(${n.x}px, ${n.y}px, 0)`; }
    }
    document.getElementById('node-'+S.draggingNode)?.classList.remove('is-drag');
    if(S.nodeDragMoved)saveState();
    S.draggingNode=null;
  }
  if(S.draggingNoteId){
    document.getElementById('sn-'+S.draggingNoteId)?.classList.remove('is-drag');
    S.draggingNoteId=null;
    saveState();
  }
  if(S.draggingFrameId){
    document.getElementById('fr-'+S.draggingFrameId)?.classList.remove('is-drag');
    S.draggingFrameId=null;
    saveState();
  }
  if(S.resizingFrameId){
    saveState();
  }
  if(S.resizingNoteId){
    S.resizingNoteId=null;
    saveState();
  }
  if(S.panDragging){S.panDragging=false;cwrap.classList.remove('dragging');}
}

function onCanvasMD(e){
  // En modo select o connect, ignorar si clicamos en un nodo.
  // Pero en modo pan (mover), dejamos que continúe para desplazar la pantalla.
  if(e.target.closest('.node') && S.mode!=='pan') return;
  if(e.button!==0)return;
  if(expandedNoteId)closeNote();
  panMoved=false;
  if(S.mode!=='connect'){
    S.panDragging=true;
    S.panStart={x:e.clientX,y:e.clientY,tx:S.tx,ty:S.ty};
    cwrap.classList.add('dragging');
    e.preventDefault();
  }
  if(S.mode==='connect'&&S.connecting)cancelConnect();
  // Click on canvas deselects edge ctx
  if(edgeCtxIdx!=null)hideEdgeCtx();
}

// ─── SELECT / DELETE ──────────────────────────────────────────────────────────
function onNodeClick(e,id){
  e.stopPropagation();
  if(S.nodeDragMoved)return;
  if(edgeCtxIdx!=null)hideEdgeCtx();
  if(S.mode==='select'){selectNode(id);}
  else if(S.mode==='connect'){
    if(!S.connecting)startConnect(id);
    else if(S.connecting!==id)finishConnect(id);
    else cancelConnect();
  }
}

function selectNode(id){
  const prev=S.selected;
  if(prev&&prev!==id)document.getElementById('node-'+prev)?.classList.remove('selected');
  // Clear edge selection so node-click focus takes over
  if(edgeCtxIdx!=null){
    edgeCtxIdx=null;
    S.selectedEdge=null;
    document.getElementById('edge-ctx').style.display='none';
  }
  S.selected=id;
  document.getElementById('node-'+id)?.classList.add('selected');
  updateEdges(); // refresh edge highlight focus
}

function deselectAll(){
  if(S.selected){document.getElementById('node-'+S.selected)?.classList.remove('selected');S.selected=null;}
  closePanel();
  updateEdges(); // restore edge base state
}

function deleteSelected(){
  if(!S.selected)return;
  const id=S.selected;
  const n=S.nodes.find(v=>v.id===id);
  if(!n)return;

  // v4.54.5 Hierarchy Safety: Orphan children to the current context's parent level
  const children = S.nodes.filter(v=>v.parentId===id);
  children.forEach(c => {
    c.parentId = S.viewContext === 'root' ? null : S.nodes.find(v=>v.id===S.viewContext)?.parentId;
  });

  S.edges=S.edges.filter(e=>e.from!==id&&e.to!==id);
  S.nodes=S.nodes.filter(v=>v.id!==id);

  // Vacuum ALL metadata — stories, props, comments, attachments, cache
  [1,2,3].forEach(slot=>{
    if(S.stories[slot]) S.stories[slot]=S.stories[slot].filter(step=>(typeof step==='string'?step:step.id)!==id);
  });
  delete S.comments[id];
  delete S.attachments[id];
  delete S.nodeProps[id];
  if(szCache[id]) delete szCache[id];

  // v4.51 Storyteller safety
  if(S.inStoryMode) stopStoryteller();

  S.selected=null;
  snapshot();
  closePanel(); render(); saveState();
  playSfx('delete');
  toast('Nodo eliminado','info');
}

// ─── CONNECT ─────────────────────────────────────────────────────────────────
let prevLine=null;

function startConnect(id){S.connecting=id;document.getElementById('node-'+id)?.classList.add('c-source');}

function finishConnect(tid){
  if(!S.edges.some(e=>e.from===S.connecting&&e.to===tid)){
    S.edges.push({from:S.connecting,to:tid,custom:true,dir:'forward',label:''});
    snapshot();
    saveState();
    toast('Conexión creada','ok');
    playSfx('connect');
  }
  const src=S.connecting;cancelConnect();updateEdges();
  document.getElementById('node-'+src)?.classList.add('selected');
  setTimeout(()=>document.getElementById('node-'+src)?.classList.remove('selected'),600);
}

function cancelConnect(){
  if(S.connecting){document.getElementById('node-'+S.connecting)?.classList.remove('c-source');S.connecting=null;}
  if(prevLine){prevLine.remove();prevLine=null;}
}

function updateConnPreview(e){
  const A=nodeBounds(S.connecting);if(!A)return;
  const wr=cwrap.getBoundingClientRect();
  const mx=(e.clientX-wr.left-S.tx)/S.scale;
  const my=(e.clientY-wr.top-S.ty)/S.scale;
  if(!prevLine||!prevLine.parentNode){
    prevLine=document.createElementNS('http://www.w3.org/2000/svg','line');
    prevLine.setAttribute('stroke','#00FF85');prevLine.setAttribute('stroke-width','2');
    prevLine.setAttribute('stroke-dasharray','8,5');prevLine.setAttribute('opacity','.65');
    svgEl.appendChild(prevLine);
  }
  prevLine.setAttribute('x1',A.cx);prevLine.setAttribute('y1',A.cy);
  prevLine.setAttribute('x2',mx);prevLine.setAttribute('y2',my);
}

function openPanel(id,tab){
  const n=S.nodes.find(n=>n.id===id);if(!n)return;
  // If panel is currently closed, ensure it opens in 'Small' ergonomic mode (v4.20)
  if(!panel.classList.contains('open')){
    setPanelWidth(380);
  }
  panelNodeId=id;
  S.panelEditMode=false;
  document.getElementById('p-icon').textContent=n.icon;
  document.getElementById('p-title').textContent=n.label;
  document.getElementById('p-sub').textContent=n.detail?.subtitle||n.sub||'';
  switchTab(tab||S.activeTab||'info');
  panel.classList.add('open');
  updateStrip();
}

function closePanel(){
  panel.classList.remove('open');
  panelNodeId=null;
  updateStrip();
}

function openPanelFromCorner(e,id){
  if(e){ e.stopPropagation(); e.preventDefault(); }
  const isOpen = panel.classList.contains('open');
  // Strict toggle: only close if it's the SAME node. 
  // If it's another node, openPanel will handle switching content.
  if(isOpen && panelNodeId === id){
    closePanel();
  } else {
    selectNode(id);
    openPanel(id,'info');
  }
}

function updateStrip(){
  const s=document.getElementById('panel-strip');if(!s)return;
  const open=panel.classList.contains('open');
  s.classList.toggle('strip-open',open);
  s.querySelector('.ps-arr').textContent=open?'▶':'◀';
  const btn=document.getElementById('btn-panel-toggle');
  if(btn)btn.classList.toggle('active',open);
}

function togglePanelStrip(){
  if(panel.classList.contains('open')){
    closePanel();
  }else{
    const id=S.selected||panelNodeId;
    if(id){openPanel(id,'info');}
    else{toast('Selecciona un nodo primero','info');}

}

function switchTab(tab){
  S.activeTab=tab;
  S.panelEditMode=false;
  const tabs=['info','files','notes','story'];
  document.querySelectorAll('.ptab').forEach((el,i)=>el.classList.toggle('active',tabs[i]===tab));
  renderPanelBody(panelNodeId||S.selected,tab);
}

  document.getElementById('f-badge').textContent=fc>0?`(${fc})`:'';

  if(tab==='info'){
    const status=props.status||'active';
    
    // MODO DASHBOARD UNIFICADO (v4.54)
    if(!S.panelEditMode){
      let h=`<div class="p-dashboard">`;

      // Node Metadata Summary (Responsible & Budget)
      h+=`<div class="ps-dash-section">
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:15px">
            <div><div class="ps-t" style="font-size:.55rem;opacity:.5;margin-bottom:4px">Responsable</div><div style="font-size:.75rem;font-weight:600;color:var(--c-cyan)">👤 ${esc(props.responsible||'Sin asignar')}</div></div>
            <div><div class="ps-t" style="font-size:.55rem;opacity:.5;margin-bottom:4px">Presupuesto</div><div style="font-size:.75rem;font-weight:600;color:var(--c-yellow)">💰 ${esc(props.budget||'---')}</div></div>
          </div>
        </div>`;

      // Business Logic / System Programming (v4.54)
      const logic = props.logic || (n.detail?.logic || '');
      if(logic){
        h+=`<div class="ps-dash-block" style="border-left:2px solid var(--c-purple);background:rgba(178,0,255,0.03);margin-top:10px">
              <div class="ps-t" style="color:var(--c-purple);font-size:.6rem">LÓGICA DEL SISTEMA (v4.54)</div>
              <p style="font-size:.72rem;font-family:monospace;white-space:pre-wrap;opacity:.8;margin-top:6px">${esc(logic)}</p>
            </div>`;
      }

// ─── STORYTELLER ACTIONS ───────────────────────────────────────────────────
let autoPlayTimer = null;

function toggleStepMeta(idx) {
  const el = document.getElementById(`step-meta-${idx}`);
  if(el) el.style.display = (el.style.display === 'none') ? 'block' : 'none';
}

function saveStepMeta(idx) {
  const title = document.getElementById(`step-title-${idx}`).value.trim();
  const desc = document.getElementById(`step-desc-${idx}`).value.trim();
  const story = S.stories[S.activeStory];
  const current = story[idx];
  const id = typeof current === 'string' ? current : current.id;
  story[idx] = { id, title, desc };
  saveState();
  renderPanelBody(panelNodeId || id, 'story');
  toast('Narración guardada', 'ok');
}

function setActiveStory(slot){
  S.activeStory = slot;
  saveState();
  // Update story player button states
  [1,2,3].forEach(i=>{
    const btn=document.getElementById('sp-h'+i);
    if(btn) btn.classList.toggle('active', i===slot);
  });
  renderPanelBody(panelNodeId || S.selected, 'story');
  toast(`Secuencia ${slot} activa`, 'info');
  if(S.inStoryMode) goToStoryStep(0);
}

function addToStory(id, slot){
  const targetSlot = slot || S.activeStory;
  const story = S.stories[targetSlot];
  const isAdded = story.some(item => (typeof item === 'string' ? item : item.id) === id);
  if(!isAdded) story.push(id);
  saveState(); 
  renderPanelBody(id, S.activeTab==='story'?'story':'info');
  toast(`Nodo añadido a Historia ${targetSlot}`,'ok');
}
function removeFromStory(idx){
  S.stories[S.activeStory].splice(idx,1);
  saveState(); renderPanelBody(panelNodeId||S.selected,'story');
  toast('Paso eliminado', 'info');
}
function moveStoryStep(idx, dir){
  const story = S.stories[S.activeStory];
  const next = idx + dir;
  if(next < 0 || next >= story.length) return;
  const temp = story[idx];
  story[idx] = story[next];
  story[next] = temp;
  saveState(); renderPanelBody(panelNodeId||S.selected,'story');
}

function startStoryteller(){
  const story = S.stories[S.activeStory];
  if(!story || !story.length) return toast('Añada nodos a esta historia primero','info');
  S.inStoryMode = true;
  S.storyIdx = 0;
  document.body.classList.add('story-active');
  document.getElementById('story-player').classList.add('show');
  goToStoryStep(0);
}
function stopStoryteller(){
  S.inStoryMode = false;
  if(autoPlayTimer) clearInterval(autoPlayTimer);
  autoPlayTimer = null;
  document.getElementById('sp-auto-btn')?.classList.remove('active');
  document.body.classList.remove('story-active');
  document.getElementById('story-player').classList.remove('show');
  document.querySelectorAll('.node').forEach(el=>el.classList.remove('story-focus'));
  document.querySelectorAll('#asvg path').forEach(p=>p.classList.remove('story-edge'));
  render();
}
function goToStoryStep(idx){
  const story = S.stories[S.activeStory];
  if(idx<0 || idx>=story.length) return;
  const prevIdx = S.storyIdx;
  S.storyIdx = idx;
  const item = story[idx];
  const nid = typeof item === 'string' ? item : item.id;
  const n = S.nodes.find(node=>node.id===nid);
  if(!n) return;
  
  // v4.54.5: Auto-Switch Context if node is hidden in sub-system
  if(n.parentId !== (S.viewContext === 'root' ? null : S.viewContext)){
    if(!n.parentId) exitNode('root');
    else {
      // Find lineage or just jump? Let's jump for now
      S.viewContext = n.parentId;
      // Re-build viewStack (v4.54.5 Logic)
      S.viewStack = [];
      let curP = n.parentId;
      while(curP){
        const pNode = S.nodes.find(v=>v.id===curP);
        if(pNode) {
          S.viewStack.unshift({id: pNode.parentId || 'root', label: pNode.parentId ? S.nodes.find(v=>v.id===pNode.parentId)?.label : 'RAÍZ'});
          curP = pNode.parentId;
        } else break;
      }
      render();
      updateBreadcrumbs();
    }
  }

  // Trace animation (v4.53)
  if(idx !== prevIdx){
    const prevItem = story[prevIdx];
    const prevId = typeof prevItem === 'string' ? prevItem : prevItem.id;
    const edge = S.edges.find(e => (e.from===prevId && e.to===nid) || (e.from===nid && e.to===prevId));
    if(edge){
      const a = getAnchors(edge.from, edge.to);
      if(a){
        const p = document.createElementNS('http://www.w3.org/2000/svg','path');
        const d_attr = (S.lineStyle==='direct') ? getDirectPath(a) : getCurvedPath(a);
        p.setAttribute('d', d_attr);
        p.setAttribute('class','path-trace-anim');
        svgEl.appendChild(p);
        setTimeout(() => p.remove(), 1500);
      }
    }
  }

  // Custom Meta
  const stitle = (typeof item === 'object' && item.title) ? item.title : (n.label || 'S/N');
  const sdesc = (typeof item === 'object' && item.desc) ? item.desc : '';

  // Update Highlights
  document.querySelectorAll('.node').forEach(el=>el.classList.remove('story-focus'));
  const el = document.getElementById('node-'+nid);
  if(el) el.classList.add('story-focus');
  
  // Highlight edges
  document.querySelectorAll('#asvg path').forEach(p=>p.classList.remove('story-edge'));
  if(idx > 0){
    const prevItem = story[idx-1];
    const prevId = typeof prevItem === 'string' ? prevItem : prevItem.id;
    // We search for the edge element in the DOM
    const p = svgEl.querySelector(`#ep-${S.edges.findIndex(e=>(e.from===prevId&&e.to===nid)||(e.to===prevId&&e.from===nid))}`);
    if(p) p.classList.add('story-edge');
  }

  // Auto-pan / Zoom
  fitNode(nid);
  
  // Render Player UI
  document.getElementById('sp-step-label').textContent = `STEP [ ${idx+1} / ${story.length} ]`;
  document.getElementById('sp-step-title').textContent = stitle.toUpperCase();
  document.getElementById('sp-step-desc').textContent = sdesc;
}
function nextStoryStep(){ 
  const story = S.stories[S.activeStory];
  if(S.storyIdx < story.length-1) goToStoryStep(S.storyIdx+1); 
  else { stopStoryteller(); toast('Historia finalizada','ok'); }
}
function prevStoryStep(){ if(S.storyIdx > 0) goToStoryStep(S.storyIdx-1); }

function toggleAutoPlay() {
  const btn = document.getElementById('sp-auto-btn');
  if(autoPlayTimer) {
    clearInterval(autoPlayTimer);
    autoPlayTimer = null;
    btn.classList.remove('active');
    btn.style.background = 'transparent';
    btn.style.color = 'var(--c-yellow)';
    toast('Auto-Play pausado', 'info');
  } else {
    btn.classList.add('active');
    btn.style.background = 'rgba(229,255,0,0.15)';
    btn.style.color = '#fff';
    toast('Auto-Play iniciado (5s)', 'ok');
    autoPlayTimer = setInterval(() => {
      const story = S.stories[S.activeStory];
      if(S.storyIdx < story.length-1) nextStoryStep();
      else stopStoryteller();
    }, 5000);
  }
}

function fitNode(id){
  const n=S.nodes.find(n=>n.id===id); if(!n) return;
  const wr=cwrap.getBoundingClientRect();
  const sz = szCache[id]||{w:290,h:95};
  const targetScale = 1.0;
  S.scale = targetScale;
  S.tx = (wr.width/2) - (n.x + sz.w/2) * S.scale;
  S.ty = (wr.height/2) - (n.y + sz.h/2) * S.scale;
  document.getElementById('diagram').style.transform = `translate(${S.tx}px,${S.ty}px) scale(${S.scale})`;
  updateMinimap();
}

// ─── NODE PROPS SAVE ──────────────────────────────────────────────────────────
function saveNodeProps(id){
  const n=S.nodes.find(n=>n.id===id);if(!n)return;
  const label=document.getElementById('ep-label')?.value.trim();
  const sub=document.getElementById('ep-sub')?.value.trim();
  const resp=document.getElementById('ep-resp')?.value.trim();
  const budget=document.getElementById('ep-budget')?.value.trim();
  const level=document.getElementById('ep-level')?.value;
  const theme=document.getElementById('ep-cp')?.dataset.val||n.theme;
  const icon=document.getElementById('ep-icon')?.value.trim()||n.icon;
  const tCol=document.getElementById('ep-txt-col')?.value;
  const shape=document.querySelector('input[name="ep-shape"]:checked')?.value;
  
  if(label)n.label=label;
  n.sub=sub!==undefined?sub:n.sub;
  n.theme=theme;n.icon=icon;
  if(shape)n.shape=shape;
  
  if(!S.nodeProps[id])S.nodeProps[id]={};
  S.nodeProps[id].responsible=resp||'';
  S.nodeProps[id].budget=budget||'';
  S.nodeProps[id].textColor=tCol;
  if(level!==undefined)S.nodeProps[id].level=level!==''?level:null;

  // Guardar detalles del negocio
  const detProc=document.getElementById('ep-det-proc')?.value.split('\n').map(s=>s.trim()).filter(s=>s)||(n.detail?.procesos||[]);
  const detInt=document.getElementById('ep-det-int')?.value.split(',').map(s=>s.trim()).filter(s=>s)||(n.detail?.integraciones||[]);
  const detCrit=document.getElementById('ep-det-crit')?.value.split('\n').map(s=>s.trim()).filter(s=>s)||(n.detail?.criticos||[]);
  const detOpp=document.getElementById('ep-det-opp')?.value.trim()||(n.detail?.oportunidad||'');
  const logic=document.getElementById('ep-logic')?.value.trim();
  
  S.nodeProps[id].logic = logic;
  S.nodeProps[id].detail = {
    subtitle: sub||(n.detail?.subtitle||''),
    procesos: detProc,
    integraciones: detInt,
    criticos: detCrit,
    oportunidad: detOpp
  };
  
  S.panelEditMode=false;

  snapshot();

function compressImage(file){
  return new Promise(resolve=>{
    const img=new Image();
    const url=URL.createObjectURL(file);
    img.onload=()=>{
      URL.revokeObjectURL(url);
      const maxW=600,maxH=600;
      let w=img.naturalWidth,h=img.naturalHeight;
      if(w>maxW||h>maxH){const r=Math.min(maxW/w,maxH/h);w=Math.round(w*r);h=Math.round(h*r);}
      const c=document.createElement('canvas');
      c.width=w;c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      resolve(c.toDataURL('image/jpeg',.72));
    };
    img.onerror=()=>resolve(null);
    img.src=url;
  });
}

function renderAttItem(nodeId,a,idx){
  const icon=a.type==='link'?'🔗':
    a.mime?.startsWith('image/')?'🖼️':
    a.mime?.includes('pdf')?'📄':
    a.mime?.includes('excel')||a.mime?.includes('sheet')?'📊':
    a.mime?.includes('word')||a.mime?.includes('document')?'📝':'📎';
  const isImg=a.type==='file'&&a.mime?.startsWith('image/')&&a.dataUrl;
  const thumb=isImg?`<img class="att-thumb" src="${a.dataUrl}" alt="${esc(a.name)}">`:`<div class="att-ico">${icon}</div>`;
  const openBtn=a.type==='link'
    ?`<button class="att-btn" onclick="window.open('${esc(a.url)}','_blank')" title="Abrir">↗</button>`
    :(a.dataUrl?`<button class="att-btn" onclick="downloadAtt('${nodeId}',${idx})" title="Descargar">⬇</button>`:'');
  return`<div class="att-item">
    ${thumb}
    <div class="att-info"><div class="att-name" title="${esc(a.name)}">${esc(a.name)}</div><div class="att-meta">${a.date}${a.size?' · '+a.size:''}</div></div>
    <div class="att-actions">${openBtn}<button class="att-btn del" onclick="deleteAtt('${nodeId}',${idx})" title="Eliminar">✕</button></div>

  fd.append('id',a.id);

    .then(r=>r.json())

      if(!d.nodes||!d.edges)throw new Error('Formato inválido');
      S.nodes=d.nodes.map(n=>({...n}));
      S.edges=d.edges.map(e=>({dir:'forward',label:'',...e}));

  ev.target.value='';

document.addEventListener('keydown',e=>{
  const tag=document.activeElement?.tagName;
  const modal=document.getElementById('m-overlay').classList.contains('open');
  const lnkModal=document.getElementById('lnk-overlay').classList.contains('open');
  if(tag==='INPUT'||tag==='TEXTAREA'||tag==='SELECT')return;

  // Ctrl/Cmd shortcuts
  if((e.ctrlKey||e.metaKey)&&e.key==='z'){e.preventDefault();undo();return;}
  if((e.ctrlKey||e.metaKey)&&(e.key==='y'||(e.shiftKey&&e.key==='z'))){e.preventDefault();redo();return;}

  if(modal||lnkModal){if(e.key==='Escape'){hideModal();hideLinkModal();}return;}

  if(e.key==='Delete'||e.key==='Backspace'){
    e.preventDefault();
    if(edgeCtxIdx!=null)deleteSelectedEdge();
    else if(S.selected)deleteSelected();
    return;
  }
  if(e.key==='Escape'){
    if(S.connecting)cancelConnect();
    else if(edgeCtxIdx!=null)hideEdgeCtx();
    else deselectAll();
    return;
  }
  if(e.key==='s'&&!e.ctrlKey&&!e.metaKey)setMode('select');
  if(e.key==='c'&&!e.ctrlKey&&!e.metaKey)setMode('connect');
  if(e.key==='p'&&!e.ctrlKey&&!e.metaKey)setMode('pan');
  if(e.key==='f')fitView();
  if(e.key==='n'){e.preventDefault();showModal();}
  if(e.key==='i'&&!e.ctrlKey&&!e.metaKey){e.preventDefault();togglePanelStrip();}
  if(e.key==='t'&&!e.ctrlKey&&!e.metaKey){e.preventDefault();toggleTheme();}
  if(e.key==='F11'){e.preventDefault();togglePresentation();}
});

// ─── TOUCH ───────────────────────────────────────────────────────────────────
let ts={pan:false,pinch:false,sx:0,sy:0,stx:0,sty:0,ld:0};
cwrap.addEventListener('touchstart',e=>{
  if(e.target.closest('.node')&&e.touches.length===1)return;
  e.preventDefault();
  if(e.touches.length===1){ts={pan:true,pinch:false,sx:e.touches[0].clientX,sy:e.touches[0].clientY,stx:S.tx,sty:S.ty};}
  else if(e.touches.length===2){const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;ts={pan:false,pinch:true,ld:Math.sqrt(dx*dx+dy*dy)};}
},{passive:false});
cwrap.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(e.touches.length===1&&ts.pan){S.tx=ts.stx+(e.touches[0].clientX-ts.sx);S.ty=ts.sty+(e.touches[0].clientY-ts.sy);applyTransform(false);updateMinimap();}
  else if(e.touches.length===2&&ts.pinch){
    const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;
    const dist=Math.sqrt(dx*dx+dy*dy),f=dist/ts.ld;
    const wr=cwrap.getBoundingClientRect(),cx=(e.touches[0].clientX+e.touches[1].clientX)/2-wr.left,cy=(e.touches[0].clientY+e.touches[1].clientY)/2-wr.top;
    S.tx=cx-(cx-S.tx)*f;S.ty=cy-(cy-S.ty)*f;
    S.scale=Math.min(3,Math.max(.15,S.scale*f));ts.ld=dist;
    applyTransform(false);updateMinimap();
  }
},{passive:false});
cwrap.addEventListener('touchend',()=>{ts={pan:false,pinch:false};});

// ─── WHEEL ───────────────────────────────────────────────────────────────────
cwrap.addEventListener('wheel',e=>{
  e.preventDefault();
  const r=cwrap.getBoundingClientRect();
  const mx=e.clientX-r.left,my=e.clientY-r.top;
  const f=e.deltaY<0?1.06:.94;
  S.tx=mx-(mx-S.tx)*f;S.ty=my-(my-S.ty)*f;
  S.scale=Math.min(3,Math.max(.15,S.scale*f));
  applyTransform(false);updateMinimap();
},{passive:false});

// ─── UNIVERSAL TOOLTIPS ──────────────────────────────────────────────────────
(()=>{
  const tip=document.getElementById('tb-tip');
  let hideTimer;
  
  const showTip = (el) => {
    if(el.closest('.tb-dropdown')?.matches(':hover')) return;
    if(el.closest('.tb-dropdown')?.classList.contains('open')) return;
    if(document.querySelector('.tb-dropdown.open')) return;
    clearTimeout(hideTimer);
    tip.textContent = el.getAttribute('data-tooltip');
    tip.style.display = 'block'; // ensure layout
    
    requestAnimationFrame(()=>{
      const r = el.getBoundingClientRect();
      const tw = Math.min(300, tip.offsetWidth || 240);
      const th = tip.offsetHeight || 40;
      const wh = window.innerHeight;
      const ww = window.innerWidth;
      
      // Horizontal centering clamped to screen
      let left = r.left + r.width/2 - tw/2;
      left = Math.max(10, Math.min(left, ww - tw - 10));
      
      // Smart Vertical Positioning:
      // If element is in Top ~160px (toolbar area), ALWAYS place BELOW.
      // Else if element is in bottom half of screen, place ABOVE.
      let t;
      if(r.top < 160) {
        t = r.bottom + 12;
      } else if(r.top > wh / 2) {
        t = r.top - th - 12;
      } else {
        t = r.bottom + 12;
      }
      
      // Clamp Y to screen boundaries
      t = Math.max(10, Math.min(t, wh - th - 10));
      
      tip.style.left = left + 'px';
      tip.style.top = t + 'px';
      tip.classList.add('show');
    });
  };

  document.addEventListener('mouseover', (e) => {
    const el = e.target.closest('[data-tooltip]');
    if(el) showTip(el);
  });
  
  document.addEventListener('mouseout', (e) => {
    const el = e.target.closest('[data-tooltip]');
    if(el) {
      hideTimer = setTimeout(() => { tip.classList.remove('show'); }, 100);
    }
  });

  document.addEventListener('mousedown', () => {
    tip.classList.remove('show');
  });
})();

function initPanelResize() {
  const resizer = document.getElementById('p-resizer');
  const panel = document.getElementById('panel');
  if (!resizer || !panel) return;
  let startX, startW;
  resizer.onmousedown = (e) => {
    startX = e.clientX;
    const currentW = getComputedStyle(document.documentElement).getPropertyValue('--panel-w').trim();
    startW = parseInt(currentW) || 380;
    document.documentElement.classList.add('is-resizing'); // Global lock to disable transitions
    document.body.style.cursor = 'ew-resize';
    document.onmousemove = (e) => {
      const delta = startX - e.clientX;
      const newW = Math.max(300, Math.min(window.innerWidth - 40, startW + delta));
      document.documentElement.style.setProperty('--panel-w', newW + 'px');
    };
    document.onmouseup = () => {
      document.onmousemove = document.onmouseup = null;
      document.documentElement.classList.remove('is-resizing');
      document.body.style.cursor = '';
      localStorage.setItem('ocf-panel-w', document.documentElement.style.getPropertyValue('--panel-w'));
    };
  };
}
function setPanelWidth(w) {
  let finalW;
  if (typeof w === 'number') {
    finalW = w;
  } else {
    const curW = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--panel-w')) || 380;
    const maxW = window.innerWidth - 45;
    finalW = (Math.abs(curW - maxW) < 10) ? 380 : maxW;
  }
  document.documentElement.style.setProperty('--panel-w', finalW + 'px');
  localStorage.setItem('ocf-panel-w', finalW + 'px');
}

  if(isOpen) {
    const tip = document.getElementById('tb-tip');
    if(tip) { tip.classList.remove('show'); setTimeout(()=>tip.style.display='none', 100); }
  }
}
function closeOrganize(){
  document.querySelector('.tb-dropdown')?.classList.remove('open');
}

// ─── HIERARCHY LOGIC (v4.54) ────────────────────────────────────────────────
function enterNode(id){
  const n = S.nodes.find(n => n.id === id);
  if(!n) return;
  
  S.viewStack.push({id: S.viewContext, label: S.viewContext === 'root' ? 'RAÍZ' : S.nodes.find(v=>v.id===S.viewContext)?.label});
  S.viewContext = id;
  S.selected = null;
  hideQuickToolbar();
  
  // Transition effect
  toast(`Entrando en: ${n.label}`, 'info');
  zoomToNode(id);
  setTimeout(()=>{
    render();
    updateBreadcrumbs();
    fitView();
  }, 300);
}

function exitNode(toId){
  if(S.viewContext === 'root' && !toId) return;
  
  if(toId){
    if(toId === 'root'){
      S.viewContext = 'root';
      S.viewStack = [];
    } else {
      const idx = S.viewStack.findIndex(v => v.id === toId);
      if(idx !== -1){
        S.viewContext = toId;
        S.viewStack.splice(idx);
      }
    }
  } else {
    const last = S.viewStack.pop();
    S.viewContext = last ? last.id : 'root';
  }

  S.selected = null;
  hideQuickToolbar();
  render();
  updateBreadcrumbs();
  fitView();
}

function updateBreadcrumbs(){
  const bc = document.getElementById('breadcrumbs');
  if(S.viewContext === 'root'){
    bc.style.display = 'none';
    return;
  }
  bc.style.display = 'flex';
  let h = `<span class="bc-item" onclick="exitNode('root')">RAÍZ</span>`;
  S.viewStack.forEach(v => {
    if(v.id === 'root') return;
    h += `<span class="bc-sep">/</span><span class="bc-item" onclick="exitNode('${v.id}')">${v.label}</span>`;
  });
  const current = S.nodes.find(n=>n.id===S.viewContext);
  h += `<span class="bc-sep">/</span><span class="bc-item active">${current?.label || 'SISTEMA'}</span>`;
  bc.innerHTML = h;
}

// ─── QUICK TOOLBAR LOGIC (v4.54) ─────────────────────────────────────────────
function showQuickToolbar(id){
  const qt = document.getElementById('quick-toolbar');
  const el = document.getElementById('node-'+id);
  if(!el) return;
  
  const rect = el.getBoundingClientRect();
  qt.style.display = 'flex';
  const left = (rect.left + rect.width/2 - 130/2); // approximate width
  qt.style.left = Math.max(10, Math.min(left, window.innerWidth - 150)) + 'px';
  qt.style.top = (rect.top - 54) + 'px';
}

function hideQuickToolbar(){
  document.getElementById('quick-toolbar').style.display = 'none';
}

function selectNode(id, silent){
  if(S.selected === id && !silent) return;
  if(S.selected) document.getElementById('node-'+S.selected)?.classList.remove('selected');
  S.selected = id;
  const el = document.getElementById('node-'+id);
  if(el) el.classList.add('selected');
  
  if(!silent){
    showQuickToolbar(id);
    // Solo actualizar panel si YA está abierto (no abrir al clicar nodo)
    if(panel.classList.contains('open')) renderPanelBody(id, S.activeTab);
  } else {
    hideQuickToolbar();
  }
}

function deselectAll(){
  if(S.selected) document.getElementById('node-'+S.selected)?.classList.remove('selected');
  S.selected = null;
  hideQuickToolbar();
  hideEdgeCtx();
}
