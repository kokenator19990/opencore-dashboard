<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Flujos de Negocio — OpenCore</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0a0a; --nav-h:40px; --tb-h:64px; --panel-w:380px;
  --c-cyan:#00E5FF; --c-green:#00FF85; --c-yellow:#E5FF00;
  --font-h:'Space Grotesk',sans-serif; --font-s:'Inter',sans-serif;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:var(--bg);color:#fff;font-family:var(--font-s);-webkit-font-smoothing:antialiased;overflow:hidden}

/* ── GRID BG ─────────────────────────────────────── */
.grid-bg{position:fixed;inset:0;z-index:1;pointer-events:none;overflow:hidden}
.grid-bg::before{
  content:"";position:absolute;width:200%;height:200%;top:-50%;left:-25%;
  background-image:linear-gradient(rgba(0,229,255,.028) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,255,.028) 1px,transparent 1px);
  background-size:60px 60px;
  transform:perspective(400px) rotateX(65deg);
  animation:gScroll 20s linear infinite;
}
.grid-bg.snap-on::before{background-size:40px 40px;opacity:1.4}
@keyframes gScroll{0%{transform:perspective(400px) rotateX(65deg) translateY(0)}100%{transform:perspective(400px) rotateX(65deg) translateY(60px)}}

/* ── TOPNAV ──────────────────────────────────────── */
.topnav{position:fixed;top:0;left:0;right:0;z-index:201;height:var(--nav-h);background:rgba(8,8,12,.98);backdrop-filter:blur(16px);border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;padding:0 1.6rem}
.topnav a{font-family:var(--font-h);font-size:.68rem;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;text-decoration:none;color:rgba(255,255,255,.35);padding:0 16px;height:var(--nav-h);display:flex;align-items:center;border-bottom:2px solid transparent;transition:color .2s,border-color .2s}
.topnav a:hover{color:rgba(255,255,255,.7)}
.topnav a.active{color:#fff;border-bottom-color:var(--c-cyan)}
.tn-sep{width:1px;height:16px;background:rgba(255,255,255,.12);margin:0 2px}

/* ── TOOLBAR ─────────────────────────────────────── */
#toolbar{
  position:fixed;top:var(--nav-h);left:0;right:0;z-index:200;height:var(--tb-h);
  background:linear-gradient(180deg,rgba(12,12,22,.99) 0%,rgba(8,8,16,.97) 100%);
  backdrop-filter:blur(28px) saturate(1.4);
  -webkit-backdrop-filter:blur(28px) saturate(1.4);
  border-bottom:1px solid rgba(0,229,255,.1);
  box-shadow:0 1px 0 rgba(0,229,255,.06), 0 8px 40px rgba(0,0,0,.55);
  display:flex;align-items:center;gap:4px;padding:0 1.4rem;overflow-x:auto;
}
#toolbar::before{
  content:"";position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent 0%,rgba(0,229,255,.25) 30%,rgba(178,0,255,.2) 70%,transparent 100%);
  pointer-events:none;
}
#toolbar::-webkit-scrollbar{display:none}
.tb-btn{
  display:flex;align-items:center;gap:6px;
  font-family:var(--font-h);font-size:.68rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;
  color:rgba(255,255,255,.68);
  background:transparent;
  border:1px solid rgba(255,255,255,.1);
  padding:7px 14px;border-radius:8px;
  cursor:pointer;
  transition:color .2s ease, background .2s ease, border-color .2s ease, transform .15s cubic-bezier(.16,1,.3,1), box-shadow .2s ease, text-shadow .2s ease;
  white-space:nowrap;flex-shrink:0;line-height:1;
  box-shadow:none;
  position:relative;overflow:hidden;
  text-shadow:0 1px 3px rgba(0,0,0,.8);
}
.tb-btn::before{
  content:"";position:absolute;inset:0;border-radius:inherit;
  background:linear-gradient(180deg,rgba(255,255,255,.04) 0%,transparent 100%);
  pointer-events:none;
}
.tb-btn:hover{
  color:#ffffff;
  background:rgba(255,255,255,.07);
  border-color:rgba(255,255,255,.28);
  transform:translateY(-1px) scale(1.012);
  box-shadow:0 4px 22px rgba(0,0,0,.45),0 1px 0 rgba(255,255,255,.08);
  text-shadow:0 0 18px rgba(255,255,255,.85),0 0 36px rgba(255,255,255,.35),0 1px 0 rgba(0,0,0,.5);
}

.tb-btn:active{transform:translateY(0) scale(.985);box-shadow:none;text-shadow:none}
.tb-btn.active{
  color:var(--c-cyan);
  border-color:rgba(0,229,255,.5);
  background:rgba(0,229,255,.08);
  box-shadow:0 0 20px rgba(0,229,255,.22),inset 0 1px 0 rgba(0,229,255,.18);
  text-shadow:0 0 14px rgba(0,229,255,.9),0 0 28px rgba(0,229,255,.45);
}
.tb-btn.m-connect.active{
  color:var(--c-green);
  border-color:rgba(0,255,133,.5);
  background:rgba(0,255,133,.07);
  box-shadow:0 0 20px rgba(0,255,133,.2),inset 0 1px 0 rgba(0,255,133,.15);
  text-shadow:0 0 14px rgba(0,255,133,.9),0 0 28px rgba(0,255,133,.4);
}
.tb-btn.m-pan.active{
  color:#B200FF;
  border-color:rgba(178,0,255,.5);
  background:rgba(178,0,255,.07);
  box-shadow:0 0 20px rgba(178,0,255,.22),inset 0 1px 0 rgba(178,0,255,.15);
  text-shadow:0 0 14px rgba(178,0,255,.9),0 0 28px rgba(178,0,255,.4);
}
.tb-btn.danger:hover{
  color:#FF5555;
  border-color:rgba(255,68,68,.42);
  background:rgba(255,68,68,.07);
  box-shadow:0 4px 16px rgba(0,0,0,.4), 0 0 12px rgba(255,68,68,.14);
}
.tb-btn:disabled{opacity:.2;cursor:not-allowed;pointer-events:none;transform:none}
.tb-btn.active-toggle{
  color:var(--c-yellow);
  border-color:rgba(229,255,0,.45);
  background:rgba(229,255,0,.07);
  box-shadow:0 0 18px rgba(229,255,0,.14), inset 0 1px 0 rgba(229,255,0,.1);
}
.tb-sep{
  width:1px;height:32px;flex-shrink:0;margin:0 6px;
  background:linear-gradient(180deg,transparent 0%,rgba(255,255,255,.14) 50%,transparent 100%);
}
.tb-sp{flex:1}
.tb-ico{font-size:1.05rem;line-height:1}
@media(max-width:1100px){.tb-lbl{display:none}}
@media(max-width:600px){.tb-sep{margin:0 2px}.tb-btn{padding:7px 9px}}

/* ── CANVAS ──────────────────────────────────────── */
#cwrap{position:fixed;top:calc(var(--nav-h) + var(--tb-h));left:0;right:0;bottom:0;z-index:10;overflow:hidden;cursor:default}
#cwrap.mode-pan{cursor:grab}
#cwrap.mode-pan.dragging,#cwrap.mode-select.dragging{cursor:grabbing}
#cwrap.mode-connect{cursor:crosshair}
#diagram{position:absolute;transform-origin:0 0;will-change:transform}

/* ── NODE CARDS ──────────────────────────────────── */
.node{position:absolute;user-select:none;min-width:290px;transition:filter .12s}
.nc{
  background:rgba(13,13,20,.99);
  border:1px solid rgba(255,255,255,.11);
  border-left:10px solid var(--nc,#00E5FF);
  border-radius:14px;
  box-shadow:0 4px 20px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.05);
  transition:box-shadow .22s,transform .14s;
  cursor:pointer;overflow:hidden;
}
.node:hover .nc{box-shadow:0 8px 28px rgba(0,0,0,.6),0 0 22px var(--ng,rgba(0,229,255,.18)),inset 0 1px 0 rgba(255,255,255,.07);transform:translateY(-2px)}
.node.selected .nc{border-color:rgba(255,255,255,.2);border-left-color:var(--nc,#00E5FF);box-shadow:0 0 0 2px var(--nc,#00E5FF),0 8px 32px rgba(0,0,0,.65),0 0 32px var(--ng,rgba(0,229,255,.32))}
.node.is-drag .nc{box-shadow:0 22px 52px rgba(0,0,0,.75);cursor:grabbing!important;transform:translateY(-4px) scale(1.018)}
.node.is-drag{z-index:1000}
.nh{display:flex;align-items:center;gap:12px;padding:18px 18px 12px 16px}
.n-icon{font-size:1.9rem;flex-shrink:0;line-height:1}
.n-lbl{font-family:var(--font-h);font-size:1.25rem;font-weight:700;letter-spacing:.8px;text-transform:uppercase;flex:1;color:var(--nc,#00E5FF);line-height:1.2}
.n-status{width:13px;height:13px;border-radius:50%;flex-shrink:0}
.ns-active{background:#00FF85}
.ns-paused{background:#888}
.ns-critical{background:#FF4444;animation:crit .7s ease-in-out infinite}
.ns-planning{background:#E5FF00}
@keyframes crit{0%,100%{opacity:1}50%{opacity:.35}}
.n-sub{font-size:1.05rem;color:rgba(255,255,255,.55);padding:0 18px 12px 16px;letter-spacing:.2px;line-height:1.4}
.n-meta{display:flex;gap:6px;padding:0 16px 10px;flex-wrap:wrap}
.n-meta-tag{font-size:.95rem;color:rgba(255,255,255,.42);background:rgba(255,255,255,.05);border-radius:5px;padding:3px 9px;white-space:nowrap}
.n-badge{display:flex;gap:7px;align-items:center;padding:0 16px 12px}
.n-badge-item{font-size:.95rem;color:var(--c-cyan);opacity:.7;display:flex;align-items:center;gap:3px}

/* ── CONNECT SOURCE ──────────────────────────────── */
.node.c-source .nc{animation:pGlow 1s ease-in-out infinite}
@keyframes pGlow{0%,100%{box-shadow:0 0 0 2px #00FF85,0 0 28px rgba(0,255,133,.45)}50%{box-shadow:0 0 0 2px #00FF85,0 0 48px rgba(0,255,133,.65)}}
#cwrap.mode-connect .node:hover .nc{box-shadow:0 0 0 2px #00FF85,0 0 18px rgba(0,255,133,.28)!important}

/* ── HANDLES ─────────────────────────────────────── */
.hd{position:absolute;width:11px;height:11px;border-radius:50%;background:var(--nc,#00E5FF);border:2px solid rgba(6,6,10,.9);opacity:0;pointer-events:none;transition:opacity .15s,transform .15s;z-index:20}
.node:hover .hd,#cwrap.mode-connect .hd{opacity:1;pointer-events:auto;cursor:crosshair}
.hd:hover{transform:scale(1.4)}
.hd-t{top:-6px;left:calc(50% - 5.5px)}
.hd-r{right:-6px;top:calc(50% - 5.5px)}
.hd-b{bottom:-6px;left:calc(50% - 5.5px)}
.hd-l{left:-6px;top:calc(50% - 5.5px)}

/* ── SVG ─────────────────────────────────────────── */
#asvg{position:absolute;top:0;left:0;pointer-events:none;overflow:visible;width:1px;height:1px}

/* ── EDGE CONTEXT TOOLBAR ────────────────────────── */
#edge-ctx{
  position:fixed;z-index:450;
  background:rgba(12,12,18,.98);border:1px solid rgba(0,229,255,.2);border-radius:10px;
  padding:5px 7px;display:none;gap:3px;align-items:center;
  backdrop-filter:blur(16px);box-shadow:0 8px 24px rgba(0,0,0,.5);
}
.ec-btn{display:flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:6px;border:1px solid rgba(255,255,255,.1);background:transparent;color:rgba(255,255,255,.45);cursor:pointer;font-size:.75rem;transition:all .15s}
.ec-btn:hover{background:rgba(255,255,255,.08);color:#fff}
.ec-btn.active{background:rgba(0,229,255,.12);border-color:rgba(0,229,255,.35);color:var(--c-cyan)}
.ec-btn.del:hover{background:rgba(255,68,68,.1);border-color:rgba(255,68,68,.3);color:#FF4444}
.ec-sep{width:1px;height:18px;background:rgba(255,255,255,.08);margin:0 2px}
.ec-lbl-input{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:5px;color:#fff;font-family:var(--font-s);font-size:.7rem;padding:4px 7px;width:90px;outline:none}
.ec-lbl-input:focus{border-color:rgba(0,229,255,.4)}

/* ── RIGHT PANEL ─────────────────────────────────── */
#panel{position:fixed;top:calc(var(--nav-h) + var(--tb-h));right:0;bottom:0;width:var(--panel-w);z-index:300;background:rgba(10,10,16,.98);border-left:1px solid rgba(0,229,255,.1);backdrop-filter:blur(20px);transform:translateX(100%);transition:transform .35s cubic-bezier(.16,1,.3,1);display:flex;flex-direction:column}
#panel.open{transform:translateX(0)}
#p-hdr{padding:1.1rem 1.1rem .7rem;border-bottom:1px solid rgba(255,255,255,.07);position:relative;flex-shrink:0}
#p-close{position:absolute;top:.9rem;right:.9rem;width:26px;height:26px;border-radius:7px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:rgba(200,200,200,.8);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.78rem;transition:all .18s}
#p-close:hover{background:rgba(255,255,255,.12);color:#fff}
#p-icon{font-size:1.6rem;line-height:1;margin-bottom:.25rem}
#p-title{font-family:var(--font-h);font-size:.85rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:.15rem}
#p-sub{font-size:.67rem;color:rgba(255,255,255,.38);letter-spacing:.4px}
#p-tabs{display:flex;border-bottom:1px solid rgba(255,255,255,.07);flex-shrink:0}
.ptab{flex:1;padding:9px 0;font-family:var(--font-h);font-size:.54rem;font-weight:700;letter-spacing:1.8px;text-transform:uppercase;color:rgba(255,255,255,.28);background:transparent;border:none;border-bottom:2px solid transparent;cursor:pointer;transition:all .18s;white-space:nowrap}
.ptab:hover{color:rgba(255,255,255,.6)}
.ptab.active{color:var(--c-cyan);border-bottom-color:var(--c-cyan)}
#p-body{flex:1;overflow-y:auto;padding:1rem;scrollbar-width:thin;scrollbar-color:rgba(0,229,255,.14) transparent}
#p-body::-webkit-scrollbar{width:4px}
#p-body::-webkit-scrollbar-thumb{background:rgba(0,229,255,.14);border-radius:2px}

/* ── PANEL SECTIONS ──────────────────────────────── */
.ps{margin-bottom:1rem}
.ps-t{font-family:var(--font-h);font-size:.56rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--c-cyan);margin-bottom:.38rem}
.ps-ul{list-style:none;display:flex;flex-direction:column;gap:.26rem}
.ps-ul li{font-size:.73rem;color:rgba(255,255,255,.68);padding-left:.9rem;position:relative;line-height:1.38}
.ps-ul li::before{content:"→";position:absolute;left:0;color:var(--c-cyan);font-size:.58rem}
.ptag{display:inline-block;font-size:.56rem;font-weight:700;font-family:var(--font-h);letter-spacing:.8px;text-transform:uppercase;padding:2px 6px;border-radius:20px;margin:2px;background:rgba(0,229,255,.06);color:var(--c-cyan);border:1px solid rgba(0,229,255,.18)}
.popp{background:rgba(0,229,255,.04);border:1px solid rgba(0,229,255,.14);border-radius:10px;padding:.75rem;margin-top:.5rem}
.popp-l{font-family:var(--font-h);font-size:.54rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--c-cyan);margin-bottom:.3rem}
.popp p{font-size:.72rem;color:rgba(255,255,255,.67);line-height:1.48}

/* ── FORM FIELDS ─────────────────────────────────── */
.ef{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:8px;color:#fff;font-family:var(--font-s);font-size:.77rem;padding:7px 10px;margin-bottom:6px;outline:none;transition:border-color .18s}
.ef:focus{border-color:rgba(0,229,255,.4)}
select.ef{appearance:none;-webkit-appearance:none;cursor:pointer}
select.ef option{background:#1a1a2e;color:#fff}
.ef-label{font-size:.58rem;color:rgba(255,255,255,.35);letter-spacing:.8px;margin-bottom:3px;display:block}
.btn-save{font-family:var(--font-h);font-size:.56rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;background:rgba(0,229,255,.1);color:var(--c-cyan);border:1px solid rgba(0,229,255,.25);border-radius:7px;padding:6px 12px;cursor:pointer;transition:all .18s;margin-bottom:.5rem}
.btn-save:hover{background:rgba(0,229,255,.18)}
.btn-sm{font-family:var(--font-h);font-size:.54rem;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;background:rgba(255,255,255,.05);color:rgba(255,255,255,.45);border:1px solid rgba(255,255,255,.1);border-radius:6px;padding:5px 9px;cursor:pointer;transition:all .18s}
.btn-sm:hover{background:rgba(255,255,255,.09);color:#fff}

/* ── COLOR PICKER ────────────────────────────────── */
.cp-row{display:flex;flex-wrap:wrap;gap:5px;margin:5px 0 10px}
.cp-sw{width:21px;height:21px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .15s,border-color .15s;flex-shrink:0;outline:none}
.cp-sw:hover{transform:scale(1.25)}
.cp-sw.active{border-color:#fff;box-shadow:0 0 8px rgba(255,255,255,.3)}

/* ── ICON PICKER ─────────────────────────────────── */
.ic-grid{display:flex;flex-wrap:wrap;gap:4px;margin:5px 0 8px}
.ic-btn{width:28px;height:28px;border-radius:6px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);cursor:pointer;font-size:.95rem;display:flex;align-items:center;justify-content:center;transition:all .15s}
.ic-btn:hover{background:rgba(255,255,255,.1)}
.ic-btn.active{background:rgba(0,229,255,.12);border-color:rgba(0,229,255,.35)}

/* ── STATUS SELECTOR ─────────────────────────────── */
.st-row{display:flex;gap:5px;margin-bottom:10px}
.st-btn{flex:1;padding:5px 4px;border-radius:7px;border:1px solid rgba(255,255,255,.1);background:transparent;color:rgba(255,255,255,.38);font-family:var(--font-h);font-size:.52rem;font-weight:700;letter-spacing:.8px;text-transform:uppercase;cursor:pointer;transition:all .15s;text-align:center}
.st-btn:hover{background:rgba(255,255,255,.06)}
.st-btn.active{border-color:rgba(0,229,255,.4);background:rgba(0,229,255,.1);color:var(--c-cyan)}
.st-btn[data-s="critical"].active{border-color:rgba(255,68,68,.4);background:rgba(255,68,68,.08);color:#FF4444}
.st-btn[data-s="paused"].active{border-color:rgba(128,128,128,.4);background:rgba(128,128,128,.08);color:#aaa}
.st-btn[data-s="planning"].active{border-color:rgba(229,255,0,.4);background:rgba(229,255,0,.06);color:var(--c-yellow)}

/* ── ATTACHMENTS ─────────────────────────────────── */
.att-add-row{display:flex;gap:6px;margin-bottom:10px}
.att-list{display:flex;flex-direction:column;gap:7px}
.att-item{display:flex;align-items:center;gap:9px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:9px;padding:8px 10px}
.att-thumb{width:38px;height:38px;border-radius:6px;object-fit:cover;flex-shrink:0}
.att-ico{width:38px;height:38px;border-radius:6px;background:rgba(255,255,255,.05);display:flex;align-items:center;justify-content:center;font-size:1.25rem;flex-shrink:0}
.att-info{flex:1;min-width:0}
.att-name{font-size:.72rem;color:rgba(255,255,255,.82);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.att-meta{font-size:.57rem;color:rgba(255,255,255,.28);margin-top:1px}
.att-actions{display:flex;gap:4px;flex-shrink:0}
.att-btn{background:none;border:1px solid rgba(255,255,255,.1);border-radius:5px;color:rgba(255,255,255,.38);cursor:pointer;font-size:.68rem;padding:3px 6px;transition:all .15s}
.att-btn:hover{color:#fff;border-color:rgba(255,255,255,.3)}
.att-btn.del:hover{color:#FF4444;border-color:rgba(255,68,68,.3)}
.att-empty{font-size:.7rem;color:rgba(255,255,255,.22);padding:.5rem 0;text-align:center}

/* ── COMMENTS ────────────────────────────────────── */
.c-ta{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:8px;color:#fff;font-family:var(--font-s);font-size:.75rem;padding:8px 10px;margin-bottom:7px;outline:none;resize:vertical;min-height:58px;transition:border-color .18s}
.c-ta:focus{border-color:rgba(0,229,255,.4)}
.btn-add-c{font-family:var(--font-h);font-size:.56rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;background:rgba(0,229,255,.1);color:var(--c-cyan);border:1px solid rgba(0,229,255,.25);border-radius:7px;padding:6px 12px;cursor:pointer;transition:all .18s;margin-bottom:.9rem;display:block}
.btn-add-c:hover{background:rgba(0,229,255,.18)}
.c-list{display:flex;flex-direction:column;gap:6px}
.c-item{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:8px;padding:9px 30px 9px 11px;position:relative}
.c-ts{font-size:.53rem;color:rgba(255,255,255,.26);letter-spacing:.5px;margin-bottom:3px}
.c-txt{font-size:.73rem;color:rgba(255,255,255,.7);line-height:1.38;white-space:pre-wrap}
.c-del{position:absolute;top:7px;right:7px;font-size:.62rem;color:rgba(255,255,255,.18);cursor:pointer;background:none;border:none;padding:2px 4px;border-radius:4px;transition:color .18s}
.c-del:hover{color:#FF4444}

/* ── MINIMAP ─────────────────────────────────────── */
#minimap{position:fixed;bottom:14px;right:14px;z-index:200;width:140px;height:80px;background:rgba(10,10,16,.92);border:1px solid rgba(255,255,255,.1);border-radius:8px;overflow:hidden;cursor:pointer}
#mm-c{width:140px;height:80px;display:block}

/* ── ADD NODE MODAL ──────────────────────────────── */
#m-overlay{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.75);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center}
#m-overlay.open{display:flex}
.mbox{background:rgba(14,14,20,.99);border:1px solid rgba(0,229,255,.18);border-radius:16px;padding:1.6rem;width:360px;max-width:calc(100vw - 2rem);max-height:90vh;overflow-y:auto}
.m-title{font-family:var(--font-h);font-size:.7rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--c-cyan);margin-bottom:1rem}
.m-lbl{font-size:.59rem;color:rgba(255,255,255,.36);letter-spacing:.8px;margin-bottom:3px;display:block}
.m-field{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:8px;color:#fff;font-family:var(--font-s);font-size:.79rem;padding:8px 10px;margin-bottom:9px;outline:none;transition:border-color .18s}
.m-field:focus{border-color:rgba(0,229,255,.4)}
select.m-field{appearance:none;-webkit-appearance:none;cursor:pointer}
select.m-field option{background:#1a1a2e;color:#fff}
.m-row{display:flex;gap:8px;margin-top:4px}
.m-ok{flex:1;background:rgba(0,229,255,.12);color:var(--c-cyan);border:1px solid rgba(0,229,255,.28);border-radius:9px;font-family:var(--font-h);font-size:.59rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:9px;cursor:pointer;transition:all .18s}
.m-ok:hover{background:rgba(0,229,255,.22)}
.m-cancel{flex:1;background:rgba(255,255,255,.04);color:rgba(255,255,255,.38);border:1px solid rgba(255,255,255,.1);border-radius:9px;font-family:var(--font-h);font-size:.59rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:9px;cursor:pointer;transition:all .18s}
.m-cancel:hover{background:rgba(255,255,255,.08);color:#fff}

/* ── LINK MODAL ──────────────────────────────────── */
#lnk-overlay{position:fixed;inset:0;z-index:510;background:rgba(0,0,0,.75);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center}
#lnk-overlay.open{display:flex}

/* ── TOAST ───────────────────────────────────────── */
#toasts{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);z-index:700;display:flex;flex-direction:column;gap:7px;pointer-events:none;align-items:center}
.toast{background:rgba(14,14,20,.97);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:9px 18px;font-size:.76rem;color:rgba(255,255,255,.82);animation:tIn .3s ease;white-space:nowrap}
.toast.ok{border-color:rgba(0,255,133,.35);color:#00FF85}
.toast.err{border-color:rgba(255,68,68,.35);color:#FF6666}
.toast.info{border-color:rgba(0,229,255,.3);color:var(--c-cyan)}
@keyframes tIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ── PRESENTATION MODE ───────────────────────────── */
body.pmode .topnav,body.pmode #toolbar{display:none!important}
body.pmode #cwrap{top:0!important}
body.pmode #minimap{display:none}
body.pmode #panel{display:none}

/* ── RESPONSIVE ──────────────────────────────────── */
@media(max-width:768px){
  :root{--panel-w:100%}
  #minimap{display:none}
}

/* ── TOOLBAR TOOLTIPS (fixed — no clippeado por overflow) ── */
#tb-tip{
  position:fixed;z-index:9999;pointer-events:none;
  background:rgba(8,8,18,.98);
  color:rgba(255,255,255,.93);
  font-family:var(--font-s);font-size:.78rem;font-weight:400;
  letter-spacing:.2px;line-height:1.52;
  padding:10px 15px;
  border-radius:10px;
  border:1px solid rgba(0,229,255,.32);
  box-shadow:0 8px 28px rgba(0,0,0,.65), 0 0 0 1px rgba(0,229,255,.06);
  max-width:280px;text-align:center;
  opacity:0;transition:opacity .18s;
  white-space:normal;
}

/* ── EDGE FLOW ANIMATION ─────────────────────────── */
@keyframes edgeFlow{to{stroke-dashoffset:-32}}

/* ── PRINT / PDF EXPORT ──────────────────────────── */
@media print {
  @page { size: A3 landscape; margin: 0; }
  * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
  body { background: #0a0a0a !important; overflow: visible !important; }
  .topnav, #toolbar, #minimap, #panel, #panel-strip, #edge-ctx, #toasts,
  #m-overlay, #lnk-overlay { display: none !important; }
  .grid-bg { display: none !important; }
  #cwrap {
    position: fixed !important;
    top: 0 !important; left: 0 !important;
    right: 0 !important; bottom: 0 !important;
    overflow: visible !important;
  }
}
.nc{position:relative}
.n-lvl{
  position:absolute;top:7px;right:7px;z-index:5;
  font-family:var(--font-h);font-size:.52rem;font-weight:700;letter-spacing:.6px;
  padding:2px 8px;border-radius:20px;
  background:rgba(0,0,0,.55);
  border:1px solid var(--nc,#00E5FF);
  color:var(--nc,#00E5FF);
  cursor:pointer;user-select:none;
  transition:all .18s;white-space:nowrap;
  box-shadow:0 0 8px rgba(0,0,0,.4);
}
.n-lvl:hover{background:rgba(0,0,0,.8);transform:scale(1.1);box-shadow:0 0 14px var(--nc,#00E5FF)}
.n-lvl-unset{opacity:.2;border-style:dashed;color:rgba(255,255,255,.4)!important;border-color:rgba(255,255,255,.2)!important}
.n-lvl-unset:hover{opacity:.6!important}
.node.upstream .nc{border-left-color:#00FF85!important;box-shadow:0 0 16px rgba(0,255,133,.2),inset 0 1px 0 rgba(0,255,133,.08)!important}
.node.downstream .nc{border-left-color:#E5FF00!important;box-shadow:0 0 16px rgba(229,255,0,.18),inset 0 1px 0 rgba(229,255,0,.07)!important}
.node.dim-ud .nc{opacity:.22;filter:grayscale(.5)}
.node.dim-ud:hover .nc{opacity:.6;filter:none}
@keyframes edgeFlowAlways{to{stroke-dashoffset:-60}}
@keyframes edgeFlowBack{to{stroke-dashoffset:60}}

/* ── INFO BTN (nodo top-right) ───────────────────── */
.n-info-btn{
  flex-shrink:0;width:17px;height:17px;border-radius:4px;padding:0;
  background:transparent;border:1px solid rgba(0,200,220,.2);
  color:rgba(0,200,220,.45);cursor:pointer;
  font-size:9.5px;font-weight:900;font-family:Georgia,serif;
  display:flex;align-items:center;justify-content:center;
  transition:all .17s;line-height:1;opacity:0;
}
.node:hover .n-info-btn,.node.selected .n-info-btn{opacity:1}
.n-info-btn:hover{background:rgba(0,229,255,.13);border-color:rgba(0,229,255,.45);color:var(--c-cyan);transform:scale(1.08)}
.node.selected .n-info-btn{border-color:rgba(0,229,255,.32);color:rgba(0,229,255,.75);opacity:1}

/* ── PANEL STRIP (barra lateral derecha) ─────────── */
#panel-strip{
  position:fixed;top:calc(var(--nav-h) + var(--tb-h));right:0;bottom:0;
  width:13px;z-index:310;
  background:rgba(0,229,255,.025);
  border-left:1px solid rgba(0,229,255,.09);
  cursor:pointer;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;
  transition:right .35s cubic-bezier(.16,1,.3,1),background .2s,border-color .2s;
}
#panel-strip:hover{background:rgba(0,229,255,.07);border-color:rgba(0,229,255,.25)}
#panel-strip .ps-arr{font-size:7px;color:rgba(0,229,255,.4);transition:color .2s,transform .35s cubic-bezier(.16,1,.3,1);line-height:1}
#panel-strip .ps-lbl{writing-mode:vertical-rl;font-family:var(--font-h);font-size:.4rem;font-weight:700;letter-spacing:2px;color:rgba(0,229,255,.28);user-select:none;transition:color .2s}
#panel-strip:hover .ps-arr,#panel-strip:hover .ps-lbl{color:rgba(0,229,255,.72)}
#panel-strip.strip-open{right:var(--panel-w)}
#panel-strip.strip-open .ps-arr{transform:rotate(180deg)}
body.pmode #panel-strip{display:none}
</style>

// ─── HISTORY ──────────────────────────────────────────────────────────────────
const H={stack:[],idx:-1};

function snapshot(){
  const s=JSON.stringify({
    nodes:S.nodes.map(n=>({...n})),
    edges:S.edges.map(e=>({...e})),
    nodeProps:JSON.parse(JSON.stringify(S.nodeProps))
  });
  H.stack.splice(H.idx+1);
  H.stack.push(s);
  if(H.stack.length>50)H.stack.shift();else H.idx++;
  updateHistBtns();
}

function undo(){
  if(H.idx<=0)return;
  H.idx--;
  restoreSnap(H.stack[H.idx]);
  toast('Deshecho','info');
}

function redo(){
  if(H.idx>=H.stack.length-1)return;
  H.idx++;
  restoreSnap(H.stack[H.idx]);
  toast('Rehecho','info');
}

function restoreSnap(json){
  const s=JSON.parse(json);
  S.nodes=s.nodes;
  S.edges=s.edges;
  S.nodeProps=s.nodeProps||{};
  S.selected=null; S.selectedEdge=null;
  closePanel(); hideEdgeCtx();
  render(); saveState(); updateHistBtns();
}

function updateHistBtns(){
  document.getElementById('btn-undo').disabled=H.idx<=0;
  document.getElementById('btn-redo').disabled=H.idx>=H.stack.length-1;
}

// ─── LOCAL STORAGE ────────────────────────────────────────────────────────────
function loadState(){
  S.nodes=NODES_BASE.map(n=>({...n}));
  S.edges=EDGES_BASE.map(e=>({...e,dir:e.dir||'forward',label:e.label||''}));
  try{
    const d=JSON.parse(localStorage.getItem('ocf')||'{}');
    if(d.pos) d.pos.forEach(p=>{const n=S.nodes.find(n=>n.id===p.id);if(n){n.x=p.x;n.y=p.y;}});
    if(d.nodes) S.nodes.push(...d.nodes);
    if(d.edges) S.edges.push(...d.edges.map(e=>({dir:'forward',label:'',...e})));
    S.nodeProps=JSON.parse(localStorage.getItem('ocf-props')||'{}');
    S.comments=JSON.parse(localStorage.getItem('ocf-comments')||'{}');
  }catch(e){console.warn('LS load',e)}
  // Cargar adjuntos desde el servidor (igual que tareas)
  loadAttachments();
}

function loadAttachments(){
  fetch(FILES_API)
    .then(r=>r.ok?r.json():Promise.reject(r.status))
    .then(data=>{
      S.attachments=data||{};
      S.nodes.forEach(n=>refreshBadge(n.id));
    })
    .catch(err=>{
      console.warn('upload.php no disponible, usando localStorage',err);
      try{S.attachments=JSON.parse(localStorage.getItem('ocf-files')||'{}');}catch(e){}
    });
}

function saveState(){
  try{
    const pos=S.nodes.map(n=>({id:n.id,x:n.x,y:n.y}));
    localStorage.setItem('ocf',JSON.stringify({
      pos,
      nodes:S.nodes.filter(n=>n.custom),
      edges:S.edges.filter(e=>e.custom||e.dir!=='forward'||e.label)
    }));
    localStorage.setItem('ocf-props',JSON.stringify(S.nodeProps));
    localStorage.setItem('ocf-comments',JSON.stringify(S.comments));
    // Adjuntos se guardan en el servidor — no en localStorage
  }catch(e){console.warn('LS save',e)}
}

// ─── EDGE ROUTING ─────────────────────────────────────────────────────────────
function nodeBounds(id){
  const n=S.nodes.find(n=>n.id===id);
  if(!n)return null;
  const sz=szCache[id]||{w:162,h:74};
  return{x:n.x,y:n.y,w:sz.w,h:sz.h,cx:n.x+sz.w/2,cy:n.y+sz.h/2};
}

function getAnchors(fid,tid){
  const A=nodeBounds(fid),B=nodeBounds(tid);
  if(!A||!B)return null;
  const dx=B.cx-A.cx,dy=B.cy-A.cy;
  const ang=Math.atan2(dy,dx)*180/Math.PI;
  const C=120;
  let sx,sy,ex,ey,c1x,c1y,c2x,c2y;
  if(ang>-45&&ang<=45){
    sx=A.x+A.w;sy=A.cy;c1x=sx+C;c1y=sy;ex=B.x;ey=B.cy;c2x=ex-C;c2y=ey;
  }else if(ang>45&&ang<=135){
    sx=A.cx;sy=A.y+A.h;c1x=sx;c1y=sy+C;ex=B.cx;ey=B.y;c2x=ex;c2y=ey-C;
  }else if(ang>135||ang<=-135){
    sx=A.x;sy=A.cy;c1x=sx-C;c1y=sy;ex=B.x+B.w;ey=B.cy;c2x=ex+C;c2y=ey;
  }else{
    sx=A.cx;sy=A.y;c1x=sx;c1y=sy-C;ex=B.cx;ey=B.y+B.h;c2x=ex;c2y=ey+C;
  }
  return{sx,sy,ex,ey,c1x,c1y,c2x,c2y};
}

function bezierMid(a){
  const t=.5,mt=1-t;
  return{
    x:mt*mt*mt*a.sx+3*mt*mt*t*a.c1x+3*mt*t*t*a.c2x+t*t*t*a.ex,
    y:mt*mt*mt*a.sy+3*mt*mt*t*a.c1y+3*mt*t*t*a.c2y+t*t*t*a.ey
  };
}

function updateEdges(){
  svgEl.innerHTML='';
  const defs=document.createElementNS('http://www.w3.org/2000/svg','defs');

  // Unified subtle-cyan edge palette
  const EDGE_COL='#4eb8c8';
  const EDGE_COL_ACT='#6ddde8';
  // Glow filter for edges
  defs.innerHTML+=`<filter id="edge-glow" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur stdDeviation="2.5" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>`;
  // Two unified markers: dim (default) and active (selected/linked)
  defs.innerHTML+=`<marker id="ae-edim" markerWidth="18" markerHeight="14" refX="16" refY="7" orient="auto"><path d="M0,0 L16,7 L0,14 L4,7 Z" fill="${EDGE_COL}" opacity=".88"/></marker>`;
  defs.innerHTML+=`<marker id="as-edim" markerWidth="18" markerHeight="14" refX="2" refY="7" orient="auto-start-reverse"><path d="M0,0 L16,7 L0,14 L4,7 Z" fill="${EDGE_COL}" opacity=".88"/></marker>`;
  defs.innerHTML+=`<marker id="ae-eact" markerWidth="22" markerHeight="16" refX="20" refY="8" orient="auto"><path d="M0,0 L20,8 L0,16 L5,8 Z" fill="${EDGE_COL_ACT}" opacity="1"/></marker>`;
  defs.innerHTML+=`<marker id="as-eact" markerWidth="22" markerHeight="16" refX="2" refY="8" orient="auto-start-reverse"><path d="M0,0 L20,8 L0,16 L5,8 Z" fill="${EDGE_COL_ACT}" opacity="1"/></marker>`;
  svgEl.appendChild(defs);

  // Determine node-selection context
  const selNode=S.selected;
  const hasSel=!!selNode;

  // Compute upstream / downstream sets for selected node
  if(selNode){
    const up=new Set();const dn=new Set();
    const uq=[selNode];const uv=new Set([selNode]);
    for(let i=0;i<uq.length;i++){const c=uq[i];S.edges.forEach(e=>{if(e.to===c&&!uv.has(e.from)){uv.add(e.from);up.add(e.from);uq.push(e.from);}});}
    const dq=[selNode];const dv=new Set([selNode]);
    for(let i=0;i<dq.length;i++){const c=dq[i];S.edges.forEach(e=>{if(e.from===c&&!dv.has(e.to)){dv.add(e.to);dn.add(e.to);dq.push(e.to);}});}
    S.upstream=up;S.downstream=dn;
  } else {
    S.upstream=new Set();S.downstream=new Set();
  }

  S.edges.forEach((e,idx)=>{
    const a=getAnchors(e.from,e.to);
    if(!a)return;
    const dir=e.dir||'forward';
    const isEdgeSel=S.selectedEdge===idx;

    const isLinked=hasSel&&(e.from===selNode||e.to===selNode);
    const isDimmed=hasSel&&!isLinked;

    // Unified subtle-cyan coloring for all connections
    const drawCol=(isLinked||isEdgeSel)?EDGE_COL_ACT:EDGE_COL;
    const markerSfx=(isLinked||isEdgeSel)?'eact':'edim';
    const opacity=isEdgeSel?1:isLinked?0.92:(hasSel?0.07:0.32);
    const strokeW=isEdgeSel?4.5:isLinked?2.8:1.6;
    const useGlow=isEdgeSel||isLinked;
    const showFlow=isEdgeSel||isLinked;

    const d=`M${a.sx},${a.sy} C${a.c1x},${a.c1y} ${a.c2x},${a.c2y} ${a.ex},${a.ey}`;

    // Hit area (invisible, wide for easy click)
    const hit=document.createElementNS('http://www.w3.org/2000/svg','path');
    hit.setAttribute('d',d);
    hit.setAttribute('stroke','transparent');
    hit.setAttribute('stroke-width','14');
    hit.setAttribute('fill','none');
    hit.style.pointerEvents='stroke';
    hit.style.cursor='pointer';
    hit.addEventListener('click',(ev)=>{ev.stopPropagation();selectEdge(idx,ev);});
    svgEl.appendChild(hit);

    // Visual path (with ID for animateMotion reference)
    const path=document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('id','ep-'+idx);
    path.setAttribute('d',d);
    path.setAttribute('stroke',drawCol);
    path.setAttribute('stroke-width',String(strokeW));
    path.setAttribute('fill','none');
    path.setAttribute('opacity',String(opacity));
    if(useGlow)path.setAttribute('filter','url(#edge-glow)');
    path.style.pointerEvents='none';
    if(dir==='forward'||dir==='both')path.setAttribute('marker-end',`url(#ae-${markerSfx})`);
    if(dir==='back'||dir==='both')path.setAttribute('marker-start',`url(#as-${markerSfx})`);
    svgEl.appendChild(path);

    // Idle flow — subtle always-on animation on ALL edges
    if(!isDimmed){
      const idle=document.createElementNS('http://www.w3.org/2000/svg','path');
      idle.setAttribute('d',d);
      idle.setAttribute('stroke',drawCol);
      idle.setAttribute('stroke-width','1.2');
      idle.setAttribute('fill','none');
      idle.setAttribute('stroke-dasharray','5 40');
      idle.setAttribute('opacity',showFlow?'0':'0.13');
      idle.style.pointerEvents='none';
      const idleDur=(4+idx*0.4)+'s';
      idle.style.animation=(dir==='back'?'edgeFlowBack ':'edgeFlowAlways ')+idleDur+' linear infinite';
      svgEl.appendChild(idle);
    }

    // Active flow dash + traveling orb for selected/linked edges
    if(showFlow){
      // Fast flow dash
      const flow=document.createElementNS('http://www.w3.org/2000/svg','path');
      flow.setAttribute('d',d);
      flow.setAttribute('stroke',drawCol);
      flow.setAttribute('stroke-width','2');
      flow.setAttribute('fill','none');
      flow.setAttribute('stroke-dasharray','10 16');
      flow.setAttribute('opacity',isEdgeSel?'0.8':'0.6');
      flow.style.pointerEvents='none';
      flow.style.animation='edgeFlow '+(isEdgeSel?'1.2':'1.8')+'s linear infinite';
      if(dir==='back')flow.style.animationDirection='reverse';
      svgEl.appendChild(flow);

      // Traveling orb via animateMotion
      const orb=document.createElementNS('http://www.w3.org/2000/svg','circle');
      orb.setAttribute('r',isEdgeSel?'5':'4');
      orb.setAttribute('fill',drawCol);
      orb.setAttribute('filter','url(#edge-glow)');
      orb.setAttribute('opacity',isEdgeSel?'0.95':'0.75');
      orb.style.pointerEvents='none';
      const orbAnim=document.createElementNS('http://www.w3.org/2000/svg','animateMotion');
      orbAnim.setAttribute('dur',isEdgeSel?'1.2s':'2s');
      orbAnim.setAttribute('repeatCount','indefinite');
      orbAnim.setAttribute('calcMode','linear');
      if(dir==='back'){orbAnim.setAttribute('keyPoints','1;0');orbAnim.setAttribute('keyTimes','0;1');}
      const orbMp=document.createElementNS('http://www.w3.org/2000/svg','mpath');
      orbMp.setAttributeNS('http://www.w3.org/1999/xlink','href','#ep-'+idx);
      orbAnim.appendChild(orbMp);
      orb.appendChild(orbAnim);
      svgEl.appendChild(orb);
    }

    // Edge label
    const lbl=e.label||'';
    if(lbl){
      const mid=bezierMid(a);
      const bg=document.createElementNS('http://www.w3.org/2000/svg','rect');
      const tw=lbl.length*5.8+10;
      bg.setAttribute('x',mid.x-tw/2);bg.setAttribute('y',mid.y-10);
      bg.setAttribute('width',tw);bg.setAttribute('height',16);
      bg.setAttribute('rx','5');bg.setAttribute('fill','rgba(10,10,18,.9)');
      bg.setAttribute('stroke',EDGE_COL_ACT);bg.setAttribute('stroke-width','0.6');bg.setAttribute('opacity','0.85');
      bg.style.pointerEvents='none';
      svgEl.appendChild(bg);

      const txt=document.createElementNS('http://www.w3.org/2000/svg','text');
      txt.setAttribute('x',mid.x);txt.setAttribute('y',mid.y+2);
      txt.setAttribute('text-anchor','middle');txt.setAttribute('dominant-baseline','middle');
      txt.setAttribute('fill',EDGE_COL_ACT);txt.setAttribute('font-size','9');
      txt.setAttribute('font-family','Inter,sans-serif');txt.setAttribute('opacity','0.85');
      txt.style.pointerEvents='none';
      txt.textContent=lbl;
      svgEl.appendChild(txt);
    }
  });

  // Connect preview line (persists across calls)
  if(prevLine&&prevLine.parentNode!==svgEl)svgEl.appendChild(prevLine);
}

// ─── MINIMAP ──────────────────────────────────────────────────────────────────
function updateMinimap(){
  const canvas=document.getElementById('mm-c');
  if(!canvas)return;
  const ctx=canvas.getContext('2d');
  const W=140,H=80;
  ctx.clearRect(0,0,W,H);
  if(!S.nodes.length)return;
  const xs=S.nodes.map(n=>n.x),ys=S.nodes.map(n=>n.y);
  const mnX=Math.min(...xs)-20,mnY=Math.min(...ys)-20;
  const mxX=Math.max(...xs)+200,mxY=Math.max(...ys)+100;
  const mmS=Math.min(W/(mxX-mnX),H/(mxY-mnY))*.88;
  const oX=(W-(mxX-mnX)*mmS)/2,oY=(H-(mxY-mnY)*mmS)/2;
  const toMM=(x,y)=>[(x-mnX)*mmS+oX,(y-mnY)*mmS+oY];
  ctx.strokeStyle='rgba(255,255,255,.07)';ctx.lineWidth=.5;
  S.edges.forEach(e=>{
    const A=nodeBounds(e.from),B=nodeBounds(e.to);
    if(!A||!B)return;
    const[ax,ay]=toMM(A.cx,A.cy),[bx,by]=toMM(B.cx,B.cy);
    ctx.beginPath();ctx.moveTo(ax,ay);ctx.lineTo(bx,by);ctx.stroke();
  });
  S.nodes.forEach(n=>{
    const sz=szCache[n.id]||{w:162,h:74};
    const[nx,ny]=toMM(n.x,n.y);
    const nw=Math.max(sz.w*mmS,4),nh=Math.max(sz.h*mmS,3);
    const col=TC[n.theme]||TC.cyan;
    ctx.fillStyle=col+'33';ctx.strokeStyle=col+'88';ctx.lineWidth=.5;
    ctx.fillRect(nx,ny,nw,nh);ctx.strokeRect(nx,ny,nw,nh);
  });
  const[rvx,rvy]=toMM(-S.tx/S.scale,-S.ty/S.scale);
  const rvw=cwrap.clientWidth/S.scale*mmS,rvh=cwrap.clientHeight/S.scale*mmS;
  ctx.strokeStyle='rgba(0,229,255,.55)';ctx.lineWidth=1.2;
  ctx.strokeRect(rvx,rvy,rvw,rvh);
}

document.getElementById('minimap').addEventListener('click',e=>{
  const rect=document.getElementById('minimap').getBoundingClientRect();
  const mx=(e.clientX-rect.left)/140,my=(e.clientY-rect.top)/80;
  const xs=S.nodes.map(n=>n.x),ys=S.nodes.map(n=>n.y);
  const mnX=Math.min(...xs)-20,mnY=Math.min(...ys)-20;
  const mxX=Math.max(...xs)+200,mxY=Math.max(...ys)+100;
  const cx=mnX+(mxX-mnX)*mx,cy=mnY+(mxY-mnY)*my;
  S.tx=cwrap.clientWidth/2-cx*S.scale;
  S.ty=cwrap.clientHeight/2-cy*S.scale;
  applyTransform(true);updateMinimap();
});

// ─── TRANSFORM ────────────────────────────────────────────────────────────────
function applyTransform(smooth){
  diag.style.transition=smooth?'transform .3s ease':'none';
  diag.style.transform=`translate(${S.tx}px,${S.ty}px) scale(${S.scale})`;
}

function zoom(f){
  const r=cwrap.getBoundingClientRect();
  const cx=r.width/2,cy=r.height/2;
  S.tx=cx-(cx-S.tx)*f;S.ty=cy-(cy-S.ty)*f;
  S.scale=Math.min(3,Math.max(.15,S.scale*f));
  applyTransform(true);updateMinimap();
}

function fitView(){
  if(!S.nodes.length)return;
  const vpW=cwrap.clientWidth-60,vpH=cwrap.clientHeight-60;
  const xs=S.nodes.map(n=>n.x),ys=S.nodes.map(n=>n.y);
  const mnX=Math.min(...xs)-20,mnY=Math.min(...ys)-20;
  const mxX=Math.max(...xs)+200,mxY=Math.max(...ys)+100;
  const cW=mxX-mnX,cH=mxY-mnY;
  S.scale=Math.min(vpW/cW,vpH/cH,1.5);
  S.tx=(vpW-cW*S.scale)/2+30-mnX*S.scale;
  S.ty=(vpH-cH*S.scale)/2+30-mnY*S.scale;
  applyTransform(true);updateMinimap();
}

// ─── AUTO LAYOUT — top-to-bottom + barycenter ordering ────────────────────────
// Lógica:
//   Nivel 0 = nodos raíz (sin dependencias) → fila superior
//   Nivel N = nodos que dependen de nivel N-1 → filas siguientes
//   Dentro de cada fila los nodos se ordenan por posición promedio de sus
//   padres (barycenter heuristic) para minimizar cruces de flechas.
// --- LEVEL BADGE CYCLE ---
function cycleLvl(e,id){
  e.stopPropagation();e.preventDefault();
  if(!S.nodeProps[id])S.nodeProps[id]={};
  const cur=S.nodeProps[id].level;
  const levels=[null,0,1,2,3,4,5,6,7];
  let curNorm=(cur===undefined||cur===null||cur==='')?null:Number(cur);
  let idx=levels.findIndex(v=>v===curNorm);
  if(idx<0)idx=0;
  const next=levels[(idx+1)%levels.length];
  S.nodeProps[id].level=next===null?null:String(next);
  snapshot();
  render();saveState();
  toast(next===null?'Nivel removido':'Nivel '+next+' asignado','ok');
}

// --- ZOOM TO NODE ---
function zoomToNode(id){
  selectNode(id);
  const n=S.nodes.find(n=>n.id===id);
  if(!n)return;
  const sz=szCache[id]||{w:300,h:95};
  const vpW=cwrap.clientWidth,vpH=cwrap.clientHeight;
  const targetScale=Math.min(1.35,Math.max(0.9,S.scale<0.9?1.0:S.scale));
  const nodeCX=n.x+sz.w/2,nodeCY=n.y+sz.h/2;
  const targetTx=vpW/2-nodeCX*targetScale;
  const targetTy=vpH/2-nodeCY*targetScale;
  const startScale=S.scale,startTx=S.tx,startTy=S.ty;
  const dur=380;const t0=performance.now();
  function step(now){
    const p=Math.min(1,(now-t0)/dur);
    const ease=1-Math.pow(1-p,3);
    S.scale=startScale+(targetScale-startScale)*ease;
    S.tx=startTx+(targetTx-startTx)*ease;
    S.ty=startTy+(targetTy-startTy)*ease;
    applyTransform(false);
    if(p<1)requestAnimationFrame(step);
    else setTimeout(()=>updateMinimap(),50);
  }
  requestAnimationFrame(step);
}


function organizeByLevel(){
  if(!S.nodes.length)return;
  const ids=S.nodes.map(n=>n.id);
  const idSet=new Set(ids);

  // Si algún nodo tiene nivel manual asignado, usar eso
  const hasManual=ids.some(id=>{const ml=S.nodeProps[id]?.level;return ml!==undefined&&ml!==null&&ml!=='';});
  const lvl={};

  if(hasManual){
    ids.forEach(id=>{
      const ml=S.nodeProps[id]?.level;
      lvl[id]=(ml!==undefined&&ml!==null&&ml!=='')?Number(ml):0;
    });
  } else {
    // Construir adyacencia
    const out={};
    ids.forEach(id=>out[id]=[]);
    S.edges.forEach(e=>{
      if(idSet.has(e.from)&&idSet.has(e.to)&&e.from!==e.to)
        out[e.from].push(e.to);
    });

    // DFS iterativo para detectar back-edges (arcos que crean ciclos)
    const color={};// 0=blanco 1=gris(en stack) 2=negro(procesado)
    ids.forEach(id=>{color[id]=0;});
    const backEdges=new Set();

    ids.forEach(startId=>{
      if(color[startId]!==0)return;
      // stack: [id, iteratorIndex]
      const stack=[[startId,0]];
      const inStack=new Set([startId]);
      color[startId]=1;
      while(stack.length){
        const [cur,idx]=stack[stack.length-1];
        const neighbors=out[cur];
        if(idx>=neighbors.length){
          color[cur]=2;inStack.delete(cur);
          stack.pop();
          if(stack.length)stack[stack.length-1][1]++;
        } else {
          const nxt=neighbors[idx];
          if(color[nxt]===1){
            // back edge detectado
            backEdges.add(cur+'->'+nxt);
            stack[stack.length-1][1]++;
          } else if(color[nxt]===0){
            color[nxt]=1;inStack.add(nxt);
            stack.push([nxt,0]);
          } else {
            stack[stack.length-1][1]++;
          }
        }
      }
    });

    // Kahn longest-path ignorando back-edges
    const ind={};
    ids.forEach(id=>ind[id]=0);
    S.edges.forEach(e=>{
      if(idSet.has(e.from)&&idSet.has(e.to)&&e.from!==e.to&&!backEdges.has(e.from+'->'+e.to))
        ind[e.to]++;
    });
    ids.forEach(id=>lvl[id]=0);
    const tempInd={...ind};
    const q=ids.filter(id=>tempInd[id]===0);
    if(!q.length)ids.forEach(id=>{lvl[id]=0;if(!q.includes(id))q.push(id);});
    for(let qi=0;qi<q.length;qi++){
      const cur=q[qi];
      out[cur].forEach(nxt=>{
        if(backEdges.has(cur+'->'+nxt))return;
        const nl=lvl[cur]+1;
        if(nl>lvl[nxt])lvl[nxt]=nl;
        if(--tempInd[nxt]===0)q.push(nxt);
      });
    }
    ids.forEach(id=>{if(lvl[id]===undefined)lvl[id]=0;});
  }

  // Agrupar por nivel y ordenar con barycenter
  const maxLvl=Math.max(0,...ids.map(id=>lvl[id]||0));
  const byLvl=[];
  for(let l=0;l<=maxLvl;l++)byLvl[l]=ids.filter(id=>lvl[id]===l);

  // Barycenter ordering (reduce cruces de flechas)
  const xOrd={};
  (byLvl[0]||[]).forEach((id,i)=>xOrd[id]=i);
  for(let l=1;l<=maxLvl;l++){
    const row=byLvl[l];if(!row||!row.length)continue;
    row.sort((a,b)=>{
      const pA=S.edges.filter(e=>e.to===a&&xOrd[e.from]!==undefined).map(e=>xOrd[e.from]);
      const pB=S.edges.filter(e=>e.to===b&&xOrd[e.from]!==undefined).map(e=>xOrd[e.from]);
      const avgA=pA.length?pA.reduce((s,v)=>s+v,0)/pA.length:0;
      const avgB=pB.length?pB.reduce((s,v)=>s+v,0)/pB.length:0;
      return avgA-avgB;
    });
    row.forEach((id,i)=>xOrd[id]=i);
  }

  // Espaciado fijo (no llena pantalla, respeta jerarquía visual)
  const NW=300,NH=95,gapX=60,gapY=90;
  const colW=NW+gapX;const rowH=NH+gapY;

  byLvl.forEach((levelNodes,l)=>{
    if(!levelNodes.length)return;
    const totalRowW=levelNodes.length*colW-gapX;
    levelNodes.forEach((id,i)=>{
      const n=S.nodes.find(n=>n.id===id);if(!n)return;
      n.x=i*colW-totalRowW/2;
      n.y=l*rowH;
    });
  });

  const minX=Math.min(...S.nodes.map(n=>n.x));
  const minY=Math.min(...S.nodes.map(n=>n.y));
  S.nodes.forEach(n=>{n.x=n.x-minX+60;n.y=n.y-minY+40;});
  snapshot();
  render();setTimeout(()=>fitView(),80);saveState();
  toast('Organizado por nivel','ok');
}

function organizeLayout(){
  if(!S.nodes.length)return;
  const ids=S.nodes.map(n=>n.id);
  const idSet=new Set(ids);

  // Construir adyacencia (ignorar self-loops)
  const inCount={};
  const outAdj={};
  const inAdj={}; // padres de cada nodo (para barycenter)
  ids.forEach(id=>{inCount[id]=0;outAdj[id]=[];inAdj[id]=[];});
  S.edges.forEach(e=>{
    if(idSet.has(e.from)&&idSet.has(e.to)&&e.from!==e.to){
      inCount[e.to]++;
      outAdj[e.from].push(e.to);
      inAdj[e.to].push(e.from);
    }
  });

  // ── Paso 1: BFS — asignar nivel topológico (longest path)
  // Un nodo queda en el nivel más profundo según todos sus predecesores.
  // Esto respeta: "no puedes estar en nivel 3 sin haber pasado por 1 y 2".
  const lvl={};
  const visited=new Set();
  const q=[];
  ids.forEach(id=>{
    if(inCount[id]===0){lvl[id]=0;q.push(id);visited.add(id);}
  });
  if(!q.length)ids.forEach(id=>{lvl[id]=0;q.push(id);visited.add(id);}); // grafo cíclico
  for(let qi=0;qi<q.length;qi++){
    const cur=q[qi];
    (outAdj[cur]||[]).forEach(nxt=>{
      const nl=(lvl[cur]||0)+1;
      if(lvl[nxt]===undefined||lvl[nxt]<nl)lvl[nxt]=nl; // siempre el más profundo
      if(!visited.has(nxt)){visited.add(nxt);q.push(nxt);}
    });
  }
  ids.forEach(id=>{if(lvl[id]===undefined)lvl[id]=0;});

  const maxLvl=Math.max(...ids.map(id=>lvl[id]));
  const byLvl=[];
  for(let l=0;l<=maxLvl;l++)byLvl[l]=ids.filter(id=>lvl[id]===l);

  // ── Paso 2: Barycenter ordering dentro de cada fila
  // Cada nodo se ordena según la posición X promedio de sus padres.
  // Reduce cruces de flechas entre niveles consecutivos.
  const xOrd={}; // posición relativa temporal para calcular barycenter
  byLvl[0].forEach((id,i)=>xOrd[id]=i);
  for(let l=1;l<=maxLvl;l++){
    byLvl[l].sort((a,b)=>{
      const pa=inAdj[a].map(p=>xOrd[p]??0);
      const pb=inAdj[b].map(p=>xOrd[p]??0);
      const avgA=pa.length?pa.reduce((s,v)=>s+v,0)/pa.length:0;
      const avgB=pb.length?pb.reduce((s,v)=>s+v,0)/pb.length:0;
      return avgA-avgB;
    });
    byLvl[l].forEach((id,i)=>xOrd[id]=i);
  }

  // ── Paso 3: Espaciado dinámico según viewport
  const NW=300,NH=95;
  const vpW=Math.max(cwrap.clientWidth,900);
  const vpH=Math.max(cwrap.clientHeight,600);
  const numLvls=maxLvl+1;
  const maxInRow=Math.max(...byLvl.map(r=>r.length));

  // Gap X: reparte el ancho sobrante entre los nodos de la fila más poblada
  const gapX=Math.max(50,Math.min(200,Math.floor((vpW-NW*maxInRow)/(maxInRow+1))));
  // Gap Y: reparte la altura sobrante entre los niveles
  const gapY=Math.max(80,Math.min(200,Math.floor((vpH-NH*numLvls)/(numLvls+1))));
  const colW=NW+gapX;
  const rowH=NH+gapY;

  // ── Paso 4: Posicionar — nivel = fila (Y), posición = columna (X), centrado
  byLvl.forEach((levelNodes,l)=>{
    const totalRowW=levelNodes.length*colW-gapX;
    levelNodes.forEach((id,i)=>{
      const n=S.nodes.find(n=>n.id===id);
      if(!n)return;
      n.x=i*colW-totalRowW/2;  // centrado horizontal dentro de la fila
      n.y=l*rowH;               // nivel = posición vertical (arriba→abajo)
    });
  });

  // Normalizar: mover todo para que empiece en (40, 40)
  const minX=Math.min(...S.nodes.map(n=>n.x));
  const minY=Math.min(...S.nodes.map(n=>n.y));
  S.nodes.forEach(n=>{n.x=n.x-minX+40;n.y=n.y-minY+40;});
  snapshot();
  render();
  setTimeout(()=>fitView(),80);
  saveState();
  toast('Diagrama organizado','ok');
}

function snapVal(v,g=40){return S.snapGrid?Math.round(v/g)*g:v;}

function onNodeMD(e,id){
  if(e.button!==0)return;
  e.stopPropagation();
  S.nodeDragMoved=false;
  if(S.mode==='select'){
    const n=S.nodes.find(n=>n.id===id);if(!n)return;
    const wr=cwrap.getBoundingClientRect();
    const mx=(e.clientX-wr.left-S.tx)/S.scale;
    const my=(e.clientY-wr.top-S.ty)/S.scale;
    S.draggingNode=id;S.dragOffset={x:mx-n.x,y:my-n.y};
    document.getElementById('node-'+id)?.classList.add('is-drag');
    e.preventDefault();
  }
}

function onMouseMove(e){
  if(S.draggingNode){
    S.nodeDragMoved=true;
    const n=S.nodes.find(n=>n.id===S.draggingNode);if(!n)return;
    const wr=cwrap.getBoundingClientRect();
    n.x=(e.clientX-wr.left-S.tx)/S.scale-S.dragOffset.x;
    n.y=(e.clientY-wr.top-S.ty)/S.scale-S.dragOffset.y;
    const el=document.getElementById('node-'+S.draggingNode);
    if(el){el.style.left=n.x+'px';el.style.top=n.y+'px';}
    updateEdges();updateMinimap();
  }else if(S.panDragging){
    const dx=e.clientX-S.panStart.x,dy=e.clientY-S.panStart.y;
    if(Math.abs(dx)>2||Math.abs(dy)>2)panMoved=true;
    S.tx=S.panStart.tx+dx;S.ty=S.panStart.ty+dy;
    applyTransform(false);updateMinimap();
  }else if(S.mode==='connect'&&S.connecting){
    updateConnPreview(e);
  }
}

function onMouseUp(){
  if(S.draggingNode){
    const n=S.nodes.find(n=>n.id===S.draggingNode);
    if(n&&S.nodeDragMoved&&S.snapGrid){
      n.x=snapVal(n.x);n.y=snapVal(n.y);
      const el=document.getElementById('node-'+S.draggingNode);
      if(el){el.style.left=n.x+'px';el.style.top=n.y+'px';}
      updateEdges();
    }
    document.getElementById('node-'+S.draggingNode)?.classList.remove('is-drag');
    if(S.nodeDragMoved)saveState();
    S.draggingNode=null;
  }
  if(S.panDragging){S.panDragging=false;cwrap.classList.remove('dragging');}
}

function onCanvasMD(e){
  if(e.target.closest('.node'))return;
  if(e.button!==0)return;
  panMoved=false;
  if(S.mode!=='connect'){
    S.panDragging=true;
    S.panStart={x:e.clientX,y:e.clientY,tx:S.tx,ty:S.ty};
    cwrap.classList.add('dragging');
    e.preventDefault();
  }
  if(S.mode==='connect'&&S.connecting)cancelConnect();
  // Click on canvas deselects edge ctx
  if(edgeCtxIdx!=null)hideEdgeCtx();
}

// ─── SELECT / DELETE ──────────────────────────────────────────────────────────
function onNodeClick(e,id){
  e.stopPropagation();
  if(S.nodeDragMoved)return;
  if(edgeCtxIdx!=null)hideEdgeCtx();
  if(S.mode==='select'){selectNode(id);openPanel(id);}
  else if(S.mode==='connect'){
    if(!S.connecting)startConnect(id);
    else if(S.connecting!==id)finishConnect(id);
    else cancelConnect();
  }
}

function selectNode(id){
  const prev=S.selected;
  if(prev&&prev!==id)document.getElementById('node-'+prev)?.classList.remove('selected');
  // Clear edge selection so node-click focus takes over
  if(edgeCtxIdx!=null){
    edgeCtxIdx=null;
    S.selectedEdge=null;
    document.getElementById('edge-ctx').style.display='none';
  }
  S.selected=id;
  document.getElementById('node-'+id)?.classList.add('selected');
  updateEdges(); // refresh edge highlight focus
}

function deselectAll(){
  if(S.selected){document.getElementById('node-'+S.selected)?.classList.remove('selected');S.selected=null;}
  closePanel();
  updateEdges(); // restore edge base state
}

function deleteSelected(){
  if(!S.selected)return;
  const id=S.selected;
  S.edges=S.edges.filter(e=>e.from!==id&&e.to!==id);
  S.nodes=S.nodes.filter(n=>n.id!==id);
  delete S.comments[id];delete S.attachments[id];delete S.nodeProps[id];
  S.selected=null;
  snapshot();
  closePanel();render();saveState();
  toast('Nodo eliminado','info');
}

// ─── CONNECT ─────────────────────────────────────────────────────────────────
let prevLine=null;

function startConnect(id){S.connecting=id;document.getElementById('node-'+id)?.classList.add('c-source');}

function finishConnect(tid){
  if(!S.edges.some(e=>e.from===S.connecting&&e.to===tid)){
    S.edges.push({from:S.connecting,to:tid,custom:true,dir:'forward',label:''});
    snapshot();
    saveState();
    toast('Conexión creada','ok');
  }
  const src=S.connecting;cancelConnect();updateEdges();
  document.getElementById('node-'+src)?.classList.add('selected');
  setTimeout(()=>document.getElementById('node-'+src)?.classList.remove('selected'),600);
}

function cancelConnect(){
  if(S.connecting){document.getElementById('node-'+S.connecting)?.classList.remove('c-source');S.connecting=null;}
  if(prevLine){prevLine.remove();prevLine=null;}
}

function updateConnPreview(e){
  const A=nodeBounds(S.connecting);if(!A)return;
  const wr=cwrap.getBoundingClientRect();
  const mx=(e.clientX-wr.left-S.tx)/S.scale;
  const my=(e.clientY-wr.top-S.ty)/S.scale;
  if(!prevLine||!prevLine.parentNode){
    prevLine=document.createElementNS('http://www.w3.org/2000/svg','line');
    prevLine.setAttribute('stroke','#00FF85');prevLine.setAttribute('stroke-width','2');
    prevLine.setAttribute('stroke-dasharray','8,5');prevLine.setAttribute('opacity','.65');
    svgEl.appendChild(prevLine);
  }
  prevLine.setAttribute('x1',A.cx);prevLine.setAttribute('y1',A.cy);
  prevLine.setAttribute('x2',mx);prevLine.setAttribute('y2',my);
}

// ─── PANEL ────────────────────────────────────────────────────────────────────
function openPanel(id,tab){
  const n=S.nodes.find(n=>n.id===id);if(!n)return;
  panelNodeId=id;
  document.getElementById('p-icon').textContent=n.icon;
  document.getElementById('p-title').textContent=n.label;
  document.getElementById('p-sub').textContent=n.detail?.subtitle||n.sub||'';
  switchTab(tab||S.activeTab||'info');
  panel.classList.add('open');
  updateStrip();
}

function closePanel(){
  panel.classList.remove('open');
  panelNodeId=null;
  updateStrip();
}

function openPanelFromCorner(e,id){e.stopPropagation();selectNode(id);openPanel(id,'info');}

function updateStrip(){
  const s=document.getElementById('panel-strip');if(!s)return;
  const open=panel.classList.contains('open');
  s.classList.toggle('strip-open',open);
  s.querySelector('.ps-arr').textContent=open?'▶':'◀';
  const btn=document.getElementById('btn-panel-toggle');
  if(btn)btn.classList.toggle('active',open);
}

function togglePanelStrip(){
  if(panel.classList.contains('open')){
    closePanel();
  }else{
    const id=S.selected||panelNodeId;
    if(id){openPanel(id,'info');}
    else{toast('Selecciona un nodo primero','info');}
  }
}

function switchTab(tab){
  S.activeTab=tab;
  const tabs=['info','props','files','notes'];
  document.querySelectorAll('.ptab').forEach((el,i)=>el.classList.toggle('active',tabs[i]===tab));
  renderPanelBody(panelNodeId||S.selected,tab);
}

// ─── NODE PROPS SAVE ──────────────────────────────────────────────────────────
function saveNodeProps(id){
  const n=S.nodes.find(n=>n.id===id);if(!n)return;
  const label=document.getElementById('ep-label')?.value.trim();
  const sub=document.getElementById('ep-sub')?.value.trim();
  const resp=document.getElementById('ep-resp')?.value.trim();
  const budget=document.getElementById('ep-budget')?.value.trim();
  const level=document.getElementById('ep-level')?.value;
  const theme=document.getElementById('ep-cp')?.dataset.val||n.theme;
  const icon=document.getElementById('ep-icon')?.value.trim()||n.icon;
  if(label)n.label=label;
  n.sub=sub!==undefined?sub:n.sub;
  n.theme=theme;n.icon=icon;
  if(n.detail&&sub)n.detail.subtitle=sub;
  if(!S.nodeProps[id])S.nodeProps[id]={};
  S.nodeProps[id].responsible=resp||'';
  S.nodeProps[id].budget=budget||'';
  if(level!==undefined)S.nodeProps[id].level=level!==''?level:null;
  snapshot();
  render();
  if(panel.classList.contains('open')){
    document.getElementById('p-icon').textContent=n.icon;
    document.getElementById('p-title').textContent=n.label;
    document.getElementById('p-sub').textContent=n.detail?.subtitle||n.sub||'';
  }
  saveState();
  toast('Nodo actualizado','ok');
}

function setNodeStatus(id,status){
  if(!S.nodeProps[id])S.nodeProps[id]={};
  S.nodeProps[id].status=status;
  document.querySelectorAll('.st-btn').forEach(el=>el.classList.toggle('active',el.dataset.s===status));
  // Update node card status dot
  const el=document.getElementById('node-'+id)?.querySelector('.n-status');
  if(el){el.className='n-status ns-'+status;}
  saveState();
}

// ─── ATTACHMENTS ─────────────────────────────────────────────────────────────
let pendingLinkNodeId=null;

function handleFileUpload(id,input){
  const files=Array.from(input.files);
  if(!files.length)return;
  files.forEach(file=>{
    const fd=new FormData();
    fd.append('action','upload');
    fd.append('nodeId',id);
    fd.append('file',file);
    toast(`Subiendo ${file.name}…`,'info');
    fetch(FILES_API,{method:'POST',body:fd})
      .then(r=>r.json())
      .then(data=>{
        if(data.error){toast('Error: '+data.error,'err');return;}
        if(!S.attachments[id])S.attachments[id]=[];
        S.attachments[id].push(data.entry);
        if(panelNodeId===id)renderPanelBody(id,'files');
        refreshBadge(id);
        toast(`📎 ${file.name} adjuntado`,'ok');
      })
      .catch(()=>toast('Sin conexión al servidor de archivos','err'));
  });
  input.value='';
}

function compressImage(file){
  return new Promise(resolve=>{
    const img=new Image();
    const url=URL.createObjectURL(file);
    img.onload=()=>{
      URL.revokeObjectURL(url);
      const maxW=600,maxH=600;
      let w=img.naturalWidth,h=img.naturalHeight;
      if(w>maxW||h>maxH){const r=Math.min(maxW/w,maxH/h);w=Math.round(w*r);h=Math.round(h*r);}
      const c=document.createElement('canvas');
      c.width=w;c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      resolve(c.toDataURL('image/jpeg',.72));
    };
    img.onerror=()=>resolve(null);
    img.src=url;
  });
}

function formatSize(b){return b>1048576?`${(b/1048576).toFixed(1)}MB`:b>1024?`${(b/1024).toFixed(0)}KB`:`${b}B`;}

function showLinkModal(id){pendingLinkNodeId=id;document.getElementById('lnk-url').value='';document.getElementById('lnk-name').value='';document.getElementById('lnk-overlay').classList.add('open');setTimeout(()=>document.getElementById('lnk-url').focus(),50);}
function hideLinkModal(){document.getElementById('lnk-overlay').classList.remove('open');pendingLinkNodeId=null;}

function submitLink(){
  const url=document.getElementById('lnk-url').value.trim();
  const name=document.getElementById('lnk-name').value.trim()||url;
  if(!url){document.getElementById('lnk-url').focus();return;}
  const id=pendingLinkNodeId;if(!id)return;
  const fd=new FormData();
  fd.append('action','add_link');
  fd.append('nodeId',id);
  fd.append('url',url);
  fd.append('name',name);
  fetch(FILES_API,{method:'POST',body:fd})
    .then(r=>r.json())
    .then(data=>{
      if(data.error){toast('Error: '+data.error,'err');return;}
      if(!S.attachments[id])S.attachments[id]=[];
      S.attachments[id].push(data.entry);
      hideLinkModal();
      if(panelNodeId===id)renderPanelBody(id,'files');
      refreshBadge(id);
      toast('🔗 Link adjuntado','ok');
    })
    .catch(()=>toast('Sin conexión al servidor','err'));
}

function renderAttItem(nodeId,a,idx){
  const icon=a.type==='link'?'🔗':
    a.mime?.startsWith('image/')?'🖼️':
    a.mime?.includes('pdf')?'📄':
    a.mime?.includes('excel')||a.mime?.includes('sheet')?'📊':
    a.mime?.includes('word')||a.mime?.includes('document')?'📝':'📎';
  const isImg=a.type==='file'&&a.mime?.startsWith('image/')&&a.dataUrl;
  const thumb=isImg?`<img class="att-thumb" src="${a.dataUrl}" alt="${esc(a.name)}">`:`<div class="att-ico">${icon}</div>`;
  const openBtn=a.type==='link'
    ?`<button class="att-btn" onclick="window.open('${esc(a.url)}','_blank')" title="Abrir">↗</button>`
    :(a.dataUrl?`<button class="att-btn" onclick="downloadAtt('${nodeId}',${idx})" title="Descargar">⬇</button>`:'');
  return`<div class="att-item">
    ${thumb}
    <div class="att-info"><div class="att-name" title="${esc(a.name)}">${esc(a.name)}</div><div class="att-meta">${a.date}${a.size?' · '+a.size:''}</div></div>
    <div class="att-actions">${openBtn}<button class="att-btn del" onclick="deleteAtt('${nodeId}',${idx})" title="Eliminar">✕</button></div>
  </div>`;
}

function deleteAtt(id,idx){
  const a=S.attachments[id]?.[idx];if(!a)return;
  const fd=new FormData();
  fd.append('action','delete');
  fd.append('nodeId',id);
  fd.append('id',a.id);
  fetch(FILES_API,{method:'POST',body:fd})
    .then(r=>r.json())
    .then(data=>{
      if(data.error){toast('Error: '+data.error,'err');return;}
      S.attachments[id]?.splice(idx,1);
      if(!S.attachments[id]?.length)delete S.attachments[id];
      if(panelNodeId===id)renderPanelBody(id,'files');
      refreshBadge(id);
      toast('Archivo eliminado','info');
    })
    .catch(()=>toast('Sin conexión al servidor','err'));
}

function downloadAtt(id,idx){
  const a=S.attachments[id]?.[idx];if(!a)return;
  if(a.url){window.open(a.url,'_blank');return;}
  if(a.dataUrl){const l=document.createElement('a');l.href=a.dataUrl;l.download=a.name;l.click();}
}

// ─── COMMENTS ────────────────────────────────────────────────────────────────
function addComment(id){
  const ta=document.getElementById('c-input');
  if(!ta||!ta.value.trim())return;
  if(!S.comments[id])S.comments[id]=[];
  const now=new Date();
  const ts=now.toLocaleDateString('es-CL',{day:'2-digit',month:'short',year:'numeric'})+' '+now.toLocaleTimeString('es-CL',{hour:'2-digit',minute:'2-digit'});
  S.comments[id].push({text:ta.value.trim(),ts});
  saveState();renderPanelBody(id,'notes');refreshBadge(id);
}

function deleteComment(id,idx){
  S.comments[id]?.splice(idx,1);
  if(!S.comments[id]?.length)delete S.comments[id];
  saveState();renderPanelBody(id,'notes');refreshBadge(id);
}

function refreshBadge(id){
  const cc=(S.comments[id]||[]).length;
  const fc=(S.attachments[id]||[]).length;
  const el=document.getElementById('node-'+id);
  if(!el)return;
  let badge=el.querySelector('.n-badge');
  const items=[];
  if(cc>0)items.push(`<span class="n-badge-item">📝 ${cc}</span>`);
  if(fc>0)items.push(`<span class="n-badge-item">📎 ${fc}</span>`);
  if(items.length){
    if(!badge){badge=document.createElement('div');badge.className='n-badge';el.querySelector('.nc').appendChild(badge);}
    badge.innerHTML=items.join('');
  }else if(badge){badge.remove();}
}

function submitModal(){
  const label=document.getElementById('m-label').value.trim();
  const sub=document.getElementById('m-sub').value.trim();
  const icon=document.getElementById('m-icon').value.trim()||'⬡';
  const theme=document.getElementById('m-theme').value||'cyan';
  const resp=document.getElementById('m-resp').value.trim();
  const lvl=document.getElementById('m-level').value;
  if(!label){document.getElementById('m-label').focus();return;}
  const vpCX=(cwrap.clientWidth/2-S.tx)/S.scale;
  const vpCY=(cwrap.clientHeight/2-S.ty)/S.scale;
  const id='c_'+Date.now();
  const nn={id,label:label.toUpperCase(),sub,icon,theme,x:snapVal(vpCX-80),y:snapVal(vpCY-40),custom:true,detail:null};
  S.nodes.push(nn);
  if(!S.nodeProps[id])S.nodeProps[id]={};
  if(resp)S.nodeProps[id].responsible=resp;
  if(lvl!=='')S.nodeProps[id].level=lvl;
  snapshot();
  hideModal();render();saveState();
  setTimeout(()=>{selectNode(id);openPanel(id,'props');},80);
  toast('Nodo creado','ok');
}

// ─── EXPORT / IMPORT ─────────────────────────────────────────────────────────
function exportPDF(){
  // Fit the view first so everything is centred and visible
  fitView();
  toast('Preparando PDF — abrirá el diálogo de impresión…','info');
  setTimeout(()=>{
    window.print();
  },420);
}

function exportJSON(){
  const data={
    version:2,
    exported:new Date().toISOString(),
    nodes:S.nodes.map(n=>({...n})),
    edges:S.edges.map(e=>({...e})),
    nodeProps:S.nodeProps,
    comments:S.comments,
    // Skip attachments with dataUrls > 100KB to keep export manageable
    attachments:Object.fromEntries(
      Object.entries(S.attachments).map(([k,arr])=>[k,arr.map(a=>a.dataUrl&&a.dataUrl.length>100000?{...a,dataUrl:null}:a)])
    )
  };
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`flujos-opencore-${new Date().toISOString().slice(0,10)}.json`;
  a.click();URL.revokeObjectURL(a.href);
  toast('Diagrama exportado','ok');
}

function importJSON(ev){
  const file=ev.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const d=JSON.parse(e.target.result);
      if(!d.nodes||!d.edges)throw new Error('Formato inválido');
      S.nodes=d.nodes.map(n=>({...n}));
      S.edges=d.edges.map(e=>({dir:'forward',label:'',...e}));
      S.nodeProps=d.nodeProps||{};
      S.comments=d.comments||{};
      S.attachments=d.attachments||{};
      S.selected=null;S.selectedEdge=null;
      snapshot();
      closePanel();hideEdgeCtx();
      render();saveState();fitView();
      toast('Diagrama importado','ok');
    }catch(err){toast('Error al importar: '+err.message,'err');}
  };
  reader.readAsText(file);
  ev.target.value='';
}

// ─── UTILS ────────────────────────────────────────────────────────────────────
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// ─── TOAST ────────────────────────────────────────────────────────────────────
function toast(msg,type='info'){
  const c=document.getElementById('toasts');
  const t=document.createElement('div');
  t.className=`toast ${type}`;t.textContent=msg;
  c.appendChild(t);
  setTimeout(()=>{t.style.opacity='0';t.style.transition='opacity .3s';setTimeout(()=>t.remove(),320);},2500);
}

// ─── KEYBOARD ────────────────────────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  const tag=document.activeElement?.tagName;
  const modal=document.getElementById('m-overlay').classList.contains('open');
  const lnkModal=document.getElementById('lnk-overlay').classList.contains('open');
  if(tag==='INPUT'||tag==='TEXTAREA'||tag==='SELECT')return;

  // Ctrl/Cmd shortcuts
  if((e.ctrlKey||e.metaKey)&&e.key==='z'){e.preventDefault();undo();return;}
  if((e.ctrlKey||e.metaKey)&&(e.key==='y'||(e.shiftKey&&e.key==='z'))){e.preventDefault();redo();return;}

  if(modal||lnkModal){if(e.key==='Escape'){hideModal();hideLinkModal();}return;}

  if(e.key==='Delete'||e.key==='Backspace'){
    e.preventDefault();
    if(edgeCtxIdx!=null)deleteSelectedEdge();
    else if(S.selected)deleteSelected();
    return;
  }
  if(e.key==='Escape'){
    if(S.connecting)cancelConnect();
    else if(edgeCtxIdx!=null)hideEdgeCtx();
    else deselectAll();
    return;
  }
  if(e.key==='s'&&!e.ctrlKey&&!e.metaKey)setMode('select');
  if(e.key==='c'&&!e.ctrlKey&&!e.metaKey)setMode('connect');
  if(e.key==='p'&&!e.ctrlKey&&!e.metaKey)setMode('pan');
  if(e.key==='f')fitView();
  if(e.key==='n'){e.preventDefault();showModal();}
  if(e.key==='i'&&!e.ctrlKey&&!e.metaKey){e.preventDefault();togglePanelStrip();}
  if(e.key==='F11'){e.preventDefault();togglePresentation();}
});

// ─── TOUCH ───────────────────────────────────────────────────────────────────
let ts={pan:false,pinch:false,sx:0,sy:0,stx:0,sty:0,ld:0};
cwrap.addEventListener('touchstart',e=>{
  if(e.target.closest('.node')&&e.touches.length===1)return;
  e.preventDefault();
  if(e.touches.length===1){ts={pan:true,pinch:false,sx:e.touches[0].clientX,sy:e.touches[0].clientY,stx:S.tx,sty:S.ty};}
  else if(e.touches.length===2){const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;ts={pan:false,pinch:true,ld:Math.sqrt(dx*dx+dy*dy)};}
},{passive:false});
cwrap.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(e.touches.length===1&&ts.pan){S.tx=ts.stx+(e.touches[0].clientX-ts.sx);S.ty=ts.sty+(e.touches[0].clientY-ts.sy);applyTransform(false);updateMinimap();}
  else if(e.touches.length===2&&ts.pinch){
    const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;
    const dist=Math.sqrt(dx*dx+dy*dy),f=dist/ts.ld;
    const wr=cwrap.getBoundingClientRect(),cx=(e.touches[0].clientX+e.touches[1].clientX)/2-wr.left,cy=(e.touches[0].clientY+e.touches[1].clientY)/2-wr.top;
    S.tx=cx-(cx-S.tx)*f;S.ty=cy-(cy-S.ty)*f;
    S.scale=Math.min(3,Math.max(.15,S.scale*f));ts.ld=dist;
    applyTransform(false);updateMinimap();
  }
},{passive:false});
cwrap.addEventListener('touchend',()=>{ts={pan:false,pinch:false};});

// ─── WHEEL ───────────────────────────────────────────────────────────────────
cwrap.addEventListener('wheel',e=>{
  e.preventDefault();
  const r=cwrap.getBoundingClientRect();
  const mx=e.clientX-r.left,my=e.clientY-r.top;
  const f=e.deltaY<0?1.02:.98;
  S.tx=mx-(mx-S.tx)*f;S.ty=my-(my-S.ty)*f;
  S.scale=Math.min(3,Math.max(.15,S.scale*f));
  applyTransform(false);updateMinimap();
},{passive:false});

// ─── GLOBAL MOUSE ────────────────────────────────────────────────────────────
cwrap.addEventListener('mousedown',onCanvasMD);
window.addEventListener('mousemove',onMouseMove);
window.addEventListener('mouseup',onMouseUp);
cwrap.addEventListener('click',e=>{
  if(e.target.closest('.node'))return;
  if(panMoved){panMoved=false;return;}
  if(S.mode==='select')deselectAll();
});
// Click outside edge ctx hides it
document.addEventListener('click',e=>{
  if(!e.target.closest('#edge-ctx')&&!e.target.closest('#asvg')&&edgeCtxIdx!=null)hideEdgeCtx();
},true);

document.getElementById('m-form').addEventListener('submit',e=>{e.preventDefault();submitModal();});

// ─── TOOLBAR TOOLTIPS ────────────────────────────────────────────────────────
(()=>{
  const tip=document.getElementById('tb-tip');
  let hideTimer;
  document.querySelectorAll('.tb-btn[data-tooltip]').forEach(btn=>{
    btn.addEventListener('mouseenter',()=>{
      clearTimeout(hideTimer);
      tip.textContent=btn.getAttribute('data-tooltip');
      tip.style.opacity='0';
      tip.style.display='block';
      // Position below button, clamped to viewport
      const r=btn.getBoundingClientRect();
      tip.style.maxWidth='280px';
      tip.style.left='0';tip.style.top='0'; // reset to measure
      // Force layout to get tip width
      requestAnimationFrame(()=>{
        const tw=Math.min(280,tip.offsetWidth||220);
        let left=r.left+r.width/2-tw/2;
        left=Math.max(8,Math.min(left,window.innerWidth-tw-8));
        tip.style.left=left+'px';
        tip.style.top=(r.bottom+9)+'px';
        tip.style.opacity='1';
      });
    });
    btn.addEventListener('mouseleave',()=>{
      hideTimer=setTimeout(()=>{tip.style.opacity='0';},120);
    });
    btn.addEventListener('mousedown',()=>{tip.style.opacity='0';});
  });
})();

// ─── INIT ────────────────────────────────────────────────────────────────────
loadState();
snapshot(); // Initial snapshot for undo baseline
applyTransform(false);
render();
</script>
