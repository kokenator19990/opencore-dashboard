<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenCORE CRM — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<style>
:root {
  --bg: #0a0a0a;
  --bg-panel: #141414;
  --border: #222222;
  --text-main: #ffffff;
  --text-dim: #888888;
  --accent-cyan: #00E5FF;
  --accent-yellow: #E5FF00;
  --accent-red: #FF2A2A;
  --accent-purple: #B200FF;
  --font-heading: 'Space Grotesk', sans-serif;
  --font-sans: 'Inter', sans-serif;
  --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: var(--font-sans);
  background: var(--bg);
  color: var(--text-main);
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

/* ANIMATED GRID */
.particles-bg {
  position: fixed; inset: 0; z-index: 1; pointer-events: none; overflow: hidden;
}
.particles-bg::before {
  content: "";
  position: absolute; width: 200%; height: 200%; top: -50%; left: -25%;
  background-image:
    linear-gradient(rgba(0,229,255,0.06) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,229,255,0.06) 1px, transparent 1px);
  background-size: 60px 60px;
  transform: perspective(400px) rotateX(65deg);
  animation: gridScroll 15s linear infinite;
}
@keyframes gridScroll {
  0%   { transform: perspective(400px) rotateX(65deg) translateY(0); }
  100% { transform: perspective(400px) rotateX(65deg) translateY(60px); }
}

/* HEADER */
.header {
  border-bottom: 1px solid var(--border);
  padding: 1.5rem 2rem;
  position: sticky; top: 0;
  background: rgba(10,10,10,0.85);
  backdrop-filter: blur(12px);
  z-index: 100;
}
.header-inner {
  max-width: 1400px; margin: 0 auto;
  display: flex; justify-content: space-between; align-items: center;
}
.header-meta { display: flex; align-items: center; gap: 1rem; }
.feedback-btn {
  font-family: var(--font-heading); font-size: 0.75rem; font-weight: 600;
  text-transform: uppercase; letter-spacing: 1px;
  color: var(--accent-cyan);
  background: rgba(0,229,255,0.05);
  border: 1px solid rgba(0,229,255,0.3);
  padding: 6px 14px; border-radius: 4px;
  text-decoration: none; transition: all 0.3s ease;
}
.feedback-btn:hover {
  background: rgba(0,229,255,0.15);
  box-shadow: 0 0 15px rgba(0,229,255,0.4);
}
.badge {
  font-size: 0.7rem; font-family: var(--font-heading);
  text-transform: uppercase; letter-spacing: 1px;
  color: var(--accent-cyan);
  border: 1px solid rgba(0,229,255,0.3);
  padding: 4px 12px; border-radius: 2px;
}

/* CONTAINER */
.container {
  position: relative; z-index: 10;
  max-width: 1400px; margin: 0 auto;
  padding: 3rem 1.5rem;
}

/* KPI STRIP */
.kpi-grid {
  display: grid;
  grid-template-columns: 160px repeat(3, 1fr);
  gap: 1px;
  background: var(--border);
  border: 1px solid var(--border);
  margin-bottom: 3.5rem;
}
.kpi-card {
  background: var(--bg);
  padding: 2rem 1.5rem;
  display: flex; flex-direction: column;
  position: relative; overflow: hidden;
}
.kpi-card.solid { background: var(--bg-panel); }
.kpi-card:hover { background: #1a1a1a; }
.kpi-label {
  font-size: 0.65rem; font-weight: 700;
  letter-spacing: 2px; color: var(--text-dim);
  text-transform: uppercase; margin-bottom: 0.75rem;
}
.kpi-value {
  font-family: var(--font-heading);
  font-size: 3.5rem; font-weight: 700;
  letter-spacing: -3px; line-height: 1;
  margin-bottom: 0.5rem;
}
.kpi-sub {
  font-size: 0.65rem; color: var(--text-dim);
  text-transform: uppercase; letter-spacing: 1px;
}
.accent-cyan   { color: var(--accent-cyan)   !important; text-shadow: 0 0 10px rgba(0,229,255,0.3); }
.accent-yellow { color: var(--accent-yellow) !important; text-shadow: 0 0 10px rgba(229,255,0,0.3); }
.accent-red    { color: var(--accent-red)    !important; }

/* Ring KPI */
.ring-card { align-items: center; text-align: center; justify-content: center; gap: 0.5rem; }
.progress-ring { position: relative; width: 90px; height: 90px; }
.progress-ring svg { width: 100%; height: 100%; transform: rotate(-90deg); }
.progress-ring circle { fill: transparent; stroke-width: 6; stroke-linecap: square; }
.progress-ring .bg { stroke: #2a2a2a; }
.progress-ring .progress {
  stroke: var(--accent-cyan);
  stroke-dasharray: 283; stroke-dashoffset: 283;
  transition: stroke-dashoffset 2s cubic-bezier(0.16,1,0.3,1);
  filter: drop-shadow(0 0 4px rgba(0,229,255,0.5));
}
.ring-text {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  font-family: var(--font-heading); font-size: 1.1rem; font-weight: 700;
}

/* SECTION TITLE */
.section-title {
  margin-bottom: 1.5rem;
  border-bottom: 1px solid var(--border);
  padding-bottom: 1rem;
  display: flex; justify-content: space-between; align-items: center;
}
.section-title h2 {
  font-family: var(--font-heading); font-weight: 700;
  font-size: 0.85rem; letter-spacing: 2px;
  text-transform: uppercase; color: var(--text-dim); margin: 0;
}

/* ANALYTICS NAV — 3 main buttons */
.analytics-nav {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 1.5rem; margin-bottom: 2rem;
}
.analytics-btn {
  background: var(--bg-panel);
  border: 1px solid var(--border);
  padding: 2.25rem 2rem;
  text-align: left; cursor: pointer;
  position: relative; overflow: hidden;
  transition: all 0.3s cubic-bezier(0.16,1,0.3,1);
  display: flex; flex-direction: column; gap: 0.4rem;
  color: var(--text-main);
}
.analytics-btn::before {
  content: ''; position: absolute;
  top: 0; left: 0; width: 100%; height: 2px;
  background: var(--text-dim); opacity: 0.3; transition: all 0.3s;
}
.analytics-btn:hover {
  background: rgba(255,255,255,0.02);
  transform: translateY(-2px);
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}
.analytics-btn.btn-contactos.active::before { background: var(--accent-cyan); opacity: 1; box-shadow: 0 0 15px var(--accent-cyan); }
.analytics-btn.btn-canal.active::before    { background: var(--accent-yellow); opacity: 1; box-shadow: 0 0 15px var(--accent-yellow); }
.analytics-btn.btn-reuniones.active::before { background: var(--accent-red); opacity: 1; box-shadow: 0 0 15px var(--accent-red); }
.analytics-btn.btn-contactos.active { background: rgba(0,229,255,0.03); border-color: rgba(0,229,255,0.25); }
.analytics-btn.btn-canal.active    { background: rgba(229,255,0,0.02); border-color: rgba(229,255,0,0.2); }
.analytics-btn.btn-reuniones.active { background: rgba(255,42,42,0.03); border-color: rgba(255,42,42,0.25); }

.abn-icon { font-size: 1.6rem; margin-bottom: 0.25rem; filter: grayscale(1) opacity(0.6); transition: filter 0.3s; }
.analytics-btn.active .abn-icon { filter: grayscale(0) opacity(1); }

.abn-label { font-family: var(--font-heading); font-size: 0.8rem; font-weight: 700; letter-spacing: 2px; color: var(--text-dim); }
.analytics-btn.active .abn-label { color: var(--text-main); }

.abn-value {
  font-family: var(--font-heading); font-size: 3rem; font-weight: 400;
  line-height: 1; margin: 0.25rem 0;
  color: var(--text-main);
}
.analytics-btn.btn-contactos.active .abn-value { color: var(--accent-cyan); text-shadow: 0 0 20px rgba(0,229,255,0.4); }
.analytics-btn.btn-reuniones.active .abn-value { color: var(--accent-red); text-shadow: 0 0 20px rgba(255,42,42,0.4); }

.abn-sub { font-size: 0.75rem; color: var(--text-dim); margin-top: 0.1rem; }

/* Reuniones controls */
.reunion-controls {
  display: flex; align-items: center; gap: 0.75rem; margin-top: 0.75rem;
}
.btn-count {
  background: none; border: 1px solid var(--border);
  color: var(--text-main); width: 30px; height: 30px;
  font-size: 1.2rem; font-weight: 700; cursor: pointer;
  transition: var(--transition);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-heading);
}
.btn-count:hover { border-color: var(--accent-red); color: var(--accent-red); }
.btn-count.plus:hover { border-color: var(--accent-cyan); color: var(--accent-cyan); }

/* CHART REVEAL PANEL */
.chart-reveal-panel {
  display: none;
  background: rgba(10,10,12,0.95);
  border: 1px solid rgba(0,229,255,0.15);
  margin-bottom: 3rem; position: relative;
  box-shadow: 0 0 50px rgba(0,229,255,0.04) inset;
  animation: fanDown 0.4s cubic-bezier(0.16,1,0.3,1) forwards;
  min-height: 430px; border-radius: 4px;
}
.chart-reveal-panel.active { display: block; }
@keyframes fanDown {
  from { opacity: 0; transform: scaleY(0.9) translateY(-20px); transform-origin: top; }
  to   { opacity: 1; transform: scaleY(1) translateY(0); }
}
.crp-inner { padding: 2rem; display: flex; flex-direction: column; min-height: 430px; }
.crp-header {
  display: flex; justify-content: space-between; align-items: center;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  padding-bottom: 1rem; margin-bottom: 1.5rem;
}
.crp-title { font-family: var(--font-heading); font-weight: 700; letter-spacing: 2px; color: var(--accent-cyan); font-size: 0.95rem; }
.crp-close { cursor: pointer; color: var(--text-dim); font-size: 1.2rem; transition: color 0.3s; }
.crp-close:hover { color: var(--accent-red); }
#active-chart { min-height: 350px !important; width: 100% !important; flex-grow: 1; }

/* COMMENT WALL */
.comment-board { margin-bottom: 3rem; }
.form-group { margin-bottom: 1rem; }
.form-group textarea {
  width: 100%; background: transparent;
  border: 1px solid var(--border); color: var(--text-main);
  padding: 1rem; font-family: var(--font-sans); font-size: 0.9rem;
  resize: vertical; transition: var(--transition);
}
.form-group textarea:focus {
  outline: none; border-color: var(--accent-cyan);
  box-shadow: inset 4px 0 0 var(--accent-cyan);
}
.btn-primary {
  background: var(--text-main); color: var(--bg);
  border: none; font-family: var(--font-sans);
  padding: 10px 20px; font-size: 0.75rem; font-weight: 800;
  letter-spacing: 2px; text-transform: uppercase; cursor: pointer;
  transition: background 0.3s;
}
.btn-primary:hover { background: var(--accent-cyan); }
.comments-list { margin-top: 1.5rem; display: flex; flex-direction: column; gap: 1rem; }
.comment-item {
  border: 1px solid var(--border); padding: 1.25rem 1.5rem;
  background: var(--bg-panel); border-left: 2px solid var(--accent-yellow);
  display: flex; justify-content: space-between; align-items: flex-start; gap: 1rem;
}
.comment-text { font-size: 0.9rem; line-height: 1.6; white-space: pre-wrap; }
.comment-meta { font-size: 0.65rem; color: var(--text-dim); margin-top: 0.5rem; letter-spacing: 1px; text-transform: uppercase; }
.comment-del {
  background: none; border: none; color: var(--text-dim);
  font-size: 0.65rem; font-weight: 700; cursor: pointer;
  text-transform: uppercase; letter-spacing: 1px; white-space: nowrap; flex-shrink: 0;
}
.comment-del:hover { color: var(--accent-red); }
.empty-state {
  padding: 3rem; text-align: center; color: var(--text-dim);
  font-size: 0.85rem; border: 1px dashed var(--border); letter-spacing: 1px;
}

/* FOOTER */
.footer {
  display: flex; flex-direction: column; align-items: center;
  gap: 1rem; padding: 4rem 2rem; margin-top: 2rem;
  border-top: 1px solid var(--border);
}
.logo-mark {
  width: 12px; height: 12px; background: var(--text-main);
  transform: rotate(45deg); box-shadow: 0 0 15px rgba(255,255,255,0.5);
}
.footer p {
  font-size: 0.7rem; font-weight: 700; letter-spacing: 3px; color: var(--text-dim);
}

/* RESPONSIVE */
@media (max-width: 1024px) {
  .kpi-grid { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 768px) {
  .analytics-nav { grid-template-columns: 1fr; }
  .kpi-grid { grid-template-columns: 1fr 1fr; }
  .kpi-value { font-size: 2.5rem; }
  .header { padding: 1rem; }
  .badge { display: none; }
}
@media (max-width: 480px) {
  .kpi-grid { grid-template-columns: 1fr; }
  .container { padding: 1.5rem 1rem; }
}
</style>
</head>
<body>
<div class="particles-bg"></div>

<!-- HEADER -->
<header class="header">
  <div class="header-inner">
    <div>
      <svg viewBox="0 0 460 120" width="155" height="36" xmlns="http://www.w3.org/2000/svg">
        <circle cx="50" cy="60" r="35" fill="none" stroke="#fff" stroke-width="12"/>
        <circle cx="50" cy="60" r="15" fill="#00E5FF"/>
        <path d="M120 25L120 95 M120 25L160 25A20 20 0 0 1 180 45A20 20 0 0 1 160 65L120 65" fill="none" stroke="#fff" stroke-width="12" stroke-linecap="square"/>
        <path d="M240 25L205 25 M205 25L205 95L240 95 M205 60L230 60" fill="none" stroke="#fff" stroke-width="12" stroke-linecap="square"/>
        <path d="M270 95L270 25L315 95L315 25" fill="none" stroke="#fff" stroke-width="12" stroke-linejoin="miter" stroke-linecap="square"/>
        <text x="345" y="70" font-family="'Space Grotesk',sans-serif" font-weight="700" font-size="42" fill="#00E5FF" letter-spacing="2">CORE</text>
      </svg>
    </div>
    <div class="header-meta">
      <a href="#muro-comentarios" class="feedback-btn" onclick="closeChart()">+ Comentario</a>
      <span class="badge">ACT: 17/03/2026 16:30</span>
    </div>
  </div>
</header>

<main class="container">

  <!-- KPI STRIP: 4 indicadores rápidos -->
  <section class="kpi-grid">

    <!-- Ring: cobertura email -->
    <div class="kpi-card ring-card solid">
      <div class="progress-ring">
        <svg viewBox="0 0 100 100">
          <circle class="bg" cx="50" cy="50" r="45"></circle>
          <circle class="progress" id="cobertura-ring" cx="50" cy="50" r="45"></circle>
        </svg>
        <div class="ring-text" id="kpi-cobertura-val">0%</div>
      </div>
      <div class="kpi-label" style="text-align:center;margin-bottom:0;">COBERTURA EMAIL</div>
    </div>

    <!-- Total base -->
    <div class="kpi-card">
      <div class="kpi-label">BASE TOTAL</div>
      <div class="kpi-value" id="kpi-total-val">0</div>
      <div class="kpi-sub">Prospectos en CRM</div>
    </div>

    <!-- Emails enviados -->
    <div class="kpi-card solid">
      <div class="kpi-label">EMAILS ENVIADOS</div>
      <div class="kpi-value accent-cyan" id="kpi-enviados-val">0</div>
      <div class="kpi-sub">Desde 17/03/2026</div>
    </div>

    <!-- Alta prioridad -->
    <div class="kpi-card">
      <div class="kpi-label">ALTA PRIORIDAD</div>
      <div class="kpi-value accent-yellow" id="kpi-alta-val">0</div>
      <div class="kpi-sub">Prospectos calificados</div>
    </div>

  </section>

  <!-- ANALYTICS NAV: 3 botones principales -->
  <div class="section-title">
    <h2>ANALÍTICA COMERCIAL</h2>

  <section class="analytics-nav">

    <!-- Botón 1: Contactadas -->
    <button class="analytics-btn btn-contactos" id="btn-contactos" onclick="showChart('contactos')">
      <div class="abn-icon">📞</div>
      <div class="abn-label">CONTACTADAS</div>
      <div class="abn-value" id="nav-contactadas">0</div>
      <div class="abn-sub">Empresas alcanzadas por email · VER GRÁFICO ↗</div>
    </button>

    <!-- Botón 2: Canal -->
    <button class="analytics-btn btn-canal" id="btn-canal" onclick="showChart('canal')">
      <div class="abn-icon">📡</div>
      <div class="abn-label">CANAL DE CONTACTO</div>
      <div class="abn-sub" style="margin-top:0.5rem;">¿Por dónde llegamos? · VER GRÁFICO ↗</div>
    </button>

    <!-- Botón 3: Reuniones (contador manual) -->
    <button class="analytics-btn btn-reuniones" id="btn-reuniones" onclick="showChart('reuniones')">
      <div class="abn-icon">🤝</div>
      <div class="abn-label">REUNIONES</div>
      <div class="abn-value" id="nav-reuniones">0</div>
      <div class="abn-sub">Cierres concertados · VER GRÁFICO ↗</div>
      <div class="reunion-controls" onclick="event.stopPropagation()">
        <button class="btn-count" onclick="cambiarReunion(-1)">−</button>
        <button class="btn-count plus" onclick="cambiarReunion(1)">+</button>
        <span style="font-size:0.7rem;color:var(--text-dim);letter-spacing:1px;">REGISTRAR</span>
      </div>
    </button>

  </section>

  <!-- CHART REVEAL PANEL -->
  <section class="chart-reveal-panel" id="chart-reveal-panel">
    <div class="crp-inner">
      <div class="crp-header">
        <span class="crp-title" id="crp-title">—</span>
        <span class="crp-close" onclick="closeChart()">✕</span>
      </div>
      <div id="active-chart"></div>
    </div>

  <!-- MURO DE COMENTARIOS -->
  <div class="section-title" style="margin-top:3rem;" id="muro-comentarios">
    <h2>MURO DE COMENTARIOS</h2>

  <section class="comment-board">
    <form id="local-comment-form">
      <div class="form-group">
        <textarea id="local-comment-text" rows="3" maxlength="500"
          placeholder="Escribe un comentario, actualización o feedback personal..."></textarea>

</main>

<footer class="footer">
  <div class="logo-mark"></div>
  <p>OPENCORE CRM // DASHBOARD EJECUTIVO</p>

<script>
const DATA = {"updated": "17/03/2026 16:30", "min_fecha": "17/03/2026", "total": 2830, "enviados": 58, "contactadas": 5, "reuniones_db": 0, "alta": 97, "media": 79, "baja": 56, "pct_email": 90.5, "email_base": 1989, "canales": {"LI Persona": 107, "Email Directo": 59, "Sin datos": 44, "LI Empresa + Email": 12, "LI Empresa": 10}, "cat_enviados": {"Industrial": 19, "Minería": 12, "Seguridad/EPP": 6, "Logística": 5, "Repuestos": 5, "Energía": 4, "Automatiz.": 3, "Arriendo Maq.": 1, "TI/Telecom": 1, "Construcción": 1}, "timeline_labels": ["2026-03-17"], "timeline_vals": [58]};

// ── Counters ───────────────────────────────────────────────────────────────
function animateVal(id, end, dur) {
  const el = document.getElementById(id);
  if (!el || end === 0) { if(el) el.textContent = 0; return; }
  let startTs = null;
  const step = ts => {
    if (!startTs) startTs = ts;
    const p = Math.min((ts - startTs) / dur, 1);
    el.textContent = Math.floor(p * end).toLocaleString();
    if (p < 1) requestAnimationFrame(step);
    else el.textContent = end.toLocaleString();
  };
  requestAnimationFrame(step);
}

// ── Ring ──────────────────────────────────────────────────────────────────
function animateRing(pct) {
  const circ = 283;
  const circle = document.getElementById('cobertura-ring');
  const text   = document.getElementById('kpi-cobertura-val');
  circle.style.strokeDasharray  = circ + ' ' + circ;
  circle.style.strokeDashoffset = circ;
  setTimeout(() => {
    circle.style.strokeDashoffset = circ - (pct / 100) * circ;
    let startTs = null;
    const step = ts => {
      if (!startTs) startTs = ts;
      const p = Math.min((ts - startTs) / 2000, 1);
      text.textContent = (p * pct).toFixed(1) + '%';
      if (p < 1) requestAnimationFrame(step);
      else text.textContent = pct + '%';
    };
    requestAnimationFrame(step);
  }, 120);
}

// ── Reuniones counter ─────────────────────────────────────────────────────
let reuniones = parseInt(localStorage.getItem('oc_reuniones_count') ?? DATA.reuniones_db ?? 0);
function updateReunionesBadge() {
  document.getElementById('nav-reuniones').textContent = reuniones;
}
window.cambiarReunion = function(delta) {
  reuniones = Math.max(0, reuniones + delta);
  localStorage.setItem('oc_reuniones_count', reuniones);
  updateReunionesBadge();
  // Si el panel de reuniones está abierto, refrescar el gráfico
  if (document.getElementById('btn-reuniones').classList.contains('active')) {
    showChart('reuniones');
  }
};

// ── Charts ────────────────────────────────────────────────────────────────
let activeChart = null;
const NEON = ['#00E5FF','#B200FF','#E5FF00','#FF2A6D','#00FFAA','#FF6B00','#4488FF','#FF88AA'];

window.closeChart = function() {
  document.getElementById('chart-reveal-panel').classList.remove('active');
  document.querySelectorAll('.analytics-btn').forEach(b => b.classList.remove('active'));
  if (activeChart) { activeChart.dispose(); activeChart = null; }
};

window.showChart = function(type) {
  document.querySelectorAll('.analytics-btn').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById('btn-' + type);
  if (btn) btn.classList.add('active');

  const panel = document.getElementById('chart-reveal-panel');
  panel.classList.add('active');

  if (activeChart) { activeChart.dispose(); activeChart = null; }
  const dom = document.getElementById('active-chart');
  activeChart = echarts.init(dom, 'dark');

  const titleEl = document.getElementById('crp-title');

  if (type === 'contactos') {
    titleEl.textContent = 'EMPRESAS CONTACTADAS POR RUBRO';
    const cats = Object.keys(DATA.cat_enviados);
    const vals = Object.values(DATA.cat_enviados);
    if (cats.length === 0) {
      activeChart.setOption({ backgroundColor:'transparent', title:{ text:'SIN DATOS AÚN', subtext:'Los datos aparecerán una vez enviados los correos', left:'center', top:'center', textStyle:{color:'#888',fontFamily:'Space Grotesk',fontSize:16}, subtextStyle:{color:'#555',fontFamily:'Inter',fontSize:12} } });
      return;
    }
    activeChart.setOption({
      backgroundColor: 'transparent',
      tooltip: { trigger:'axis', backgroundColor:'rgba(10,10,15,0.95)', borderColor:'rgba(0,229,255,0.3)', textStyle:{color:'#fff',fontFamily:'Inter'} },
      grid: { left:'3%', right:'4%', bottom:'8%', top:'8%', containLabel:true },
      xAxis: {
        type:'category', data:cats,
        axisLabel:{ color:'#00E5FF', fontFamily:'Space Grotesk', fontSize:11, fontWeight:'bold', rotate: cats.length>6 ? 25 : 0, interval:0 },
        axisLine:{ lineStyle:{ color:'rgba(0,229,255,0.2)' } }
      },
      yAxis: {
        type:'value',
        splitLine:{ lineStyle:{ color:'rgba(0,229,255,0.05)', type:'dashed' } },
        axisLabel:{ color:'#888', fontFamily:'Inter', fontSize:11 }
      },
      series: [{
        type:'bar', barWidth:'55%', data:vals,
        itemStyle:{
          borderRadius:[6,6,0,0],
          color: function(p) {
            const c = NEON[p.dataIndex % NEON.length];
            return new echarts.graphic.LinearGradient(0,0,0,1,[{offset:0,color:c},{offset:1,color:c+'18'}]);
          },
          shadowBlur:15
        },
        label:{ show:true, position:'top', color:'#00E5FF', fontFamily:'Space Grotesk', fontWeight:'bold', fontSize:13 }
      }]
    });
  }

  else if (type === 'canal') {
    titleEl.textContent = 'CANAL DE CONTACTO — DISTRIBUCIÓN';
    const canales = Object.keys(DATA.canales);
    const canVals = Object.values(DATA.canales);
    if (canales.length === 0) {
      activeChart.setOption({ backgroundColor:'transparent', title:{ text:'SIN DATOS', subtext:'Ejecuta el script de outreach para generar datos', left:'center', top:'center', textStyle:{color:'#888',fontFamily:'Space Grotesk',fontSize:16}, subtextStyle:{color:'#555',fontFamily:'Inter',fontSize:12} } });
      return;
    }
    activeChart.setOption({
      backgroundColor: 'transparent',
      tooltip: { trigger:'axis', backgroundColor:'rgba(10,10,15,0.95)', borderColor:'rgba(229,255,0,0.3)', textStyle:{color:'#fff',fontFamily:'Inter'} },
      grid: { left:'3%', right:'4%', bottom:'8%', top:'5%', containLabel:true },
      xAxis: {
        type:'category', data:canales,
        axisLabel:{ color:'#E5FF00', fontFamily:'Space Grotesk', fontSize:10, fontWeight:'bold', rotate:18, interval:0 },
        axisLine:{ lineStyle:{ color:'rgba(229,255,0,0.2)' } }
      },
      yAxis: {
        type:'value',
        splitLine:{ lineStyle:{ color:'rgba(229,255,0,0.05)', type:'dashed' } },
        axisLabel:{ color:'#888', fontFamily:'Inter', fontSize:11 }
      },
      series: [{
        type:'bar', barWidth:'50%', data:canVals,
        itemStyle:{
          borderRadius:[6,6,0,0],
          color: function(p) {
            return new echarts.graphic.LinearGradient(0,0,0,1,[{offset:0,color:'#E5FF00'},{offset:1,color:'#E5FF0018'}]);
          },
          shadowBlur:15, shadowColor:'rgba(229,255,0,0.3)'
        },
        label:{ show:true, position:'top', color:'#E5FF00', fontFamily:'Space Grotesk', fontWeight:'bold', fontSize:13 }
      }]
    });
  }

  else if (type === 'reuniones') {
    titleEl.textContent = 'REUNIONES CONCERTADAS';
    const totalR   = reuniones;
    const restante = Math.max(0, DATA.enviados - totalR);
    if (totalR > 0) {
      activeChart.setOption({
        backgroundColor: 'transparent',
        tooltip: { trigger:'item', backgroundColor:'rgba(10,10,15,0.95)', borderColor:'rgba(255,42,42,0.3)', textStyle:{color:'#fff',fontFamily:'Inter'}, formatter: '{b}: {c} ({d}%)' },
        legend: { bottom:'2%', left:'center', textStyle:{color:'#888',fontFamily:'Inter',fontSize:11}, itemGap:20, icon:'circle' },
        series: [{
          name:'Campana', type:'pie',
          radius:['50%','78%'], center:['50%','46%'],
          itemStyle:{ borderRadius:10, borderColor:'#141414', borderWidth:3 },
          label:{ show:false },
          data:[
            { value:totalR,   name:'Reuniones logradas',  itemStyle:{ color:'#FF2A2A', shadowColor:'rgba(255,42,42,0.5)', shadowBlur:15 } },
            { value:restante, name:'Sin reunión aún',     itemStyle:{ color:'rgba(255,255,255,0.04)' } }
          ]
        }]
      });
    } else {
      activeChart.setOption({
        backgroundColor:'transparent',
        title:{
          text:'SIN REUNIONES REGISTRADAS',
          subtext:'Usa los botones  −  +  de la tarjeta para registrar avances',
          left:'center', top:'center',
          textStyle:{ color:'#A0AEC0', fontFamily:'Space Grotesk', fontSize:16, fontWeight:'bold' },
          subtextStyle:{ color:'rgba(160,174,192,0.45)', fontFamily:'Inter', fontSize:13 }
        }
      });
    }
  }
};

// ── Comment wall ──────────────────────────────────────────────────────────
function loadComments() {
  const list = JSON.parse(localStorage.getItem('oc_comments_v2') || '[]');
  const el   = document.getElementById('comments-list');
  if (!list.length) {
    el.innerHTML = '<div class="empty-state">Sin comentarios aún. ¡Escribe el primero!</div>';
    return;
  }
  el.innerHTML = list.slice().reverse().map((c, ri) => {
    const idx = list.length - 1 - ri;
    const textEscaped = c.text.replace(/</g,'&lt;').replace(/>/g,'&gt;');
    return '<div class="comment-item">'
      + '<div><div class="comment-text">' + textEscaped + '</div>'
      + '<div class="comment-meta">' + c.date + '</div></div>'
      + '<button class="comment-del" onclick="deleteComment(' + idx + ')">BORRAR</button>'
      + '</div>';
  }).join('');
}

window.deleteComment = function(i) {
  const list = JSON.parse(localStorage.getItem('oc_comments_v2') || '[]');
  list.splice(i, 1);
  localStorage.setItem('oc_comments_v2', JSON.stringify(list));
  loadComments();
};

document.getElementById('local-comment-form').addEventListener('submit', function(e) {
  e.preventDefault();
  const text = document.getElementById('local-comment-text').value.trim();
  if (!text) return;
  const list = JSON.parse(localStorage.getItem('oc_comments_v2') || '[]');
  list.push({ text: text, date: new Date().toLocaleString('es-CL') });
  if (list.length > 30) list.splice(0, list.length - 30);
  localStorage.setItem('oc_comments_v2', JSON.stringify(list));
  document.getElementById('local-comment-text').value = '';
  loadComments();
});

// ── Init ──────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', function() {
  animateVal('kpi-total-val',    DATA.total,    1500);
  animateVal('kpi-enviados-val', DATA.enviados, 1500);
  animateVal('kpi-alta-val',     DATA.alta,     1500);
  animateVal('nav-contactadas',  DATA.enviados, 1500);
  animateRing(DATA.pct_email);
  updateReunionesBadge();
  loadComments();
});

window.addEventListener('resize', () => { if (activeChart) activeChart.resize(); });
</script>
